<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MONC 관리자</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55; }
    .topbar { display: flex; align-items: center; justify-content: space-between;
              padding: 14px 22px; background: var(--surface); border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; z-index: 10; }
    .brand { font-size: 19px; font-weight: 700; color: var(--primary); }
    .brand b { color: var(--action); }
    .badge { font-size: 11px; font-weight: 700; color: #fff; background: var(--action);
             border-radius: 999px; padding: 3px 9px; margin-left: 8px; vertical-align: middle; }
    .logout { font-size: 13px; color: var(--text-muted); background: none; border: 1px solid var(--border);
              border-radius: 999px; padding: 6px 14px; cursor: pointer; }
    .logout:hover { border-color: var(--action); color: var(--action); }

    .tabs { display: flex; gap: 4px; padding: 0 22px; background: var(--surface); border-bottom: 1px solid var(--border-soft); position: sticky; top: 57px; z-index: 9; overflow-x: auto; }
    .tabbtn { border: 0; background: none; padding: 12px 16px; font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
    .tabbtn.active { color: var(--action); border-bottom-color: var(--action); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .rounds-wrap { padding: 24px; max-width: 900px; }
    .round-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; align-items: end; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .round-form .field label { font-size: 12px; color: var(--text-muted); }
    .round-form input, .round-form select { padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 14px; width: 100%; }
    .round-list { display: flex; flex-direction: column; gap: 8px; }
    .round-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); padding: 12px 14px; }
    .round-item .ri-main { font-weight: 700; font-size: 15px; }
    .round-item .ri-sub { font-size: 13px; color: var(--text-muted); }
    .round-item .ri-del { font-size: 12px; color: var(--action-dark); background: none; border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; cursor: pointer; }

    .apps-wrap { padding: 20px; max-width: 900px; }
    .apps-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .apps-toolbar .search { flex: 1; min-width: 160px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 14px; }
    .apps-count { font-size: 13px; color: var(--text-muted); }
    .app-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .app-card .ac-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .app-card .ac-name { font-weight: 800; font-size: 16px; }
    .app-card .ac-date { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    .app-card .ac-phone { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    .app-card .ac-ch { font-size: 13px; color: var(--text); margin: 8px 0; }
    .app-card .ac-linked { font-size: 11px; font-weight: 700; color: #1a7f37; }
    .app-card .ac-unlinked { font-size: 11px; color: var(--text-dim); }
    .app-card .ac-toggles { display: flex; gap: 8px; margin-top: 8px; }
    .app-card .ac-tg { border: 1px solid var(--border); background: #fff; border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-muted); }
    .app-card .ac-tg.on { background: #1a7f37; color: #fff; border-color: #1a7f37; }
    .app-card .ac-tg.on-refund { background: var(--action); color: #fff; border-color: var(--action); }
    .app-card .ac-del { margin-left: auto; border: 1px solid var(--border); background: #fff; border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--action-dark); }
    .app-card .ac-del:hover { background: var(--action-tint); }

    .reviews-wrap { padding: 20px; max-width: 900px; }
    .rv-upload { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .rv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .rv-item { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); overflow: hidden; }
    .rv-item img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; background: var(--surface2); }
    .rv-item.hidden img { opacity: .4; }
    .rv-meta { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .rv-meta .row { display: flex; gap: 6px; align-items: center; }
    .rv-order { width: 52px; padding: 6px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 13px; }
    .rv-btn { flex: 1; border: 1px solid var(--border); background: #fff; border-radius: var(--radius-xs); padding: 6px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-muted); }
    .rv-btn.on { background: #1a7f37; color: #fff; border-color: #1a7f37; }
    .rv-del { color: var(--action-dark); border-color: var(--action); }

    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 0; min-height: calc(100vh - 57px); }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } .side { border-right: 0; border-bottom: 1px solid var(--border-soft); } }

    .side { background: var(--surface); border-right: 1px solid var(--border-soft); padding: 16px; }
    .side h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 10px; }
    .search { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-xs);
              font-size: 14px; margin-bottom: 12px; }
    .mlist { list-style: none; display: flex; flex-direction: column; gap: 4px; max-height: 60vh; overflow-y: auto; }
    .mitem { padding: 10px 12px; border-radius: var(--radius-xs); cursor: pointer; border: 1px solid transparent; }
    .mitem:hover { background: var(--surface2); }
    .mitem.active { background: var(--action-tint); border-color: #f2c9b8; }
    .mitem .mn { font-weight: 600; font-size: 15px; }
    .mitem .me { font-size: 12px; color: var(--text-dim); }
    .mitem .madm { font-size: 10px; color: var(--action); font-weight: 700; }
    .side .newcohort { margin-top: 18px; border-top: 1px solid var(--border-soft); padding-top: 14px; }

    .main { padding: 24px; }
    .empty-main { color: var(--text-dim); text-align: center; padding: 80px 20px; }

    .panel { background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius);
             box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
    .panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

    .prow { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: var(--text-muted); }
    .field input, .field select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 14px; }
    .field input[readonly] { background: var(--surface2); color: var(--text-muted); }

    .btn { font-size: 14px; font-weight: 600; border: 0; border-radius: var(--radius-xs); padding: 9px 16px; cursor: pointer; }
    .btn-action { background: var(--action); color: #fff; }
    .btn-action:hover { background: var(--action-dark); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 6px 10px; font-size: 13px; }

    /* 14일 편집 테이블 */
    .drow { display: grid; grid-template-columns: 60px 220px 1fr 64px; gap: 10px; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--border-soft); }
    @media (max-width: 640px) {
      .drow { grid-template-columns: 44px 1fr; row-gap: 8px; padding: 12px 0; }
      .drow .d-comment, .drow .d-save { grid-column: 1 / -1; }
      .seg button { padding: 10px 12px; }
      .d-comment input { padding: 12px 10px; font-size: 15px; }
    }
    .drow .d-num { font-weight: 700; font-size: 14px; }
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
    .seg button { border: 0; background: #fff; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); }
    .seg button.on-ok { background: #1a7f37; color: #fff; }
    .seg button.on-no { background: var(--action); color: #fff; }
    .seg button.on-clear { background: var(--text-dim); color: #fff; }
    .d-comment input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 13px; }
    .d-save button { width: 100%; }
    .drow.dirty { background: #fffaf0; box-shadow: inset 3px 0 0 var(--action); }

    .ba { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .ba { grid-template-columns: 1fr; } }
    .ba .slot { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; }
    .ba .slot .tag { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .ba .slot.after .tag { color: var(--action); }
    .ba audio { width: 100%; margin: 8px 0; }
    .ba .slot .cur { font-size: 12px; color: var(--text-dim); word-break: break-all; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary);
             color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; color: var(--text-dim); padding: 80px 0; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">MO<b>N</b>C <span class="badge">관리자</span></div>
    <button class="logout" id="logoutBtn">로그아웃</button>
  </div>

  <div class="tabs" id="tabs" style="display:none;">
    <button class="tabbtn active" data-tab="members">회원 관리</button>
    <button class="tabbtn" data-tab="rounds">모집일정</button>
    <button class="tabbtn" data-tab="apps">신청자 현황</button>
    <button class="tabbtn" data-tab="reviews">후기 관리</button>
  </div>

  <div class="loading" id="loading">확인 중…</div>

  <div class="tab-panel active" id="panel-members">
  <div class="layout" id="layout" style="display:none;">
    <aside class="side">
      <h2>회원 (<span id="mCount">0</span>)</h2>
      <input class="search" id="search" placeholder="이름·이메일 검색" />
      <ul class="mlist" id="mlist"></ul>

      <div class="newcohort">
        <h2>기수 추가</h2>
        <div class="field" style="margin-bottom:8px;">
          <input id="cohortName" placeholder="예: MONC 1기" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;">
        </div>
        <button class="btn btn-ghost btn-sm" id="addCohortBtn">+ 기수 만들기</button>
      </div>
    </aside>

    <main class="main">
      <div class="empty-main" id="emptyMain">왼쪽에서 회원을 선택하세요.</div>
      <div id="detail" style="display:none;"></div>
    </main>
  </div>

  </div><!-- /panel-members -->

  <div class="tab-panel" id="panel-rounds">
    <div class="rounds-wrap">
      <form class="round-form" id="roundForm">
        <div class="field"><label>챌린지</label>
          <select id="rfChallenge">
            <option value="voice">보이스</option>
            <option value="expression">표현력</option>
            <option value="spinning">스피닝</option>
            <option value="answer">답변</option>
          </select></div>
        <div class="field"><label>기수</label><input id="rfRound" type="number" min="1" placeholder="예: 3"></div>
        <div class="field"><label>모집 시작</label><input id="rfStart" type="date"></div>
        <div class="field"><label>모집 마감</label><input id="rfEnd" type="date"></div>
        <div class="field"><label>프로그램 시작(선택)</label><input id="rfProgram" type="date"></div>
        <button class="btn btn-action" type="submit">추가/수정</button>
      </form>
      <div class="round-list" id="roundList"><div class="loading">불러오는 중…</div></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-apps">
    <div class="apps-wrap">
      <div class="apps-toolbar">
        <input type="text" class="search" id="appSearch" placeholder="이름·전화·챌린지 검색">
        <span class="apps-count" id="appCount"></span>
        <button class="btn btn-ghost btn-sm" id="appRefresh">새로고침</button>
        <button class="btn btn-action btn-sm" id="appCsv">CSV</button>
      </div>
      <div id="appsBody"><div class="loading">불러오는 중…</div></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-reviews">
    <div class="reviews-wrap">
      <div class="rv-upload">
        <input type="file" id="rvFile" accept="image/*">
        <input type="text" id="rvCaption" placeholder="설명(선택)" style="flex:1;min-width:140px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;">
        <button class="btn btn-action" id="rvUpload">업로드</button>
      </div>
      <div class="rv-grid" id="rvGrid"><div class="loading">불러오는 중…</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const sb = () => MONC.sb;
    let members = [], cohorts = [], currentId = null;

    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }
    function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    document.getElementById('logoutBtn').addEventListener('click', () => MONC.signOut());

    async function loadCohorts() {
      const { data } = await sb().from('cohorts').select('*').order('created_at', { ascending: true });
      cohorts = data || [];
    }

    async function loadMembers() {
      const { data } = await sb().from('members').select('*').order('created_at', { ascending: true });
      members = data || [];
      renderMemberList();
    }

    function renderMemberList() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const list = members.filter(m =>
        !q || (m.name && m.name.toLowerCase().includes(q)) || (m.email && m.email.toLowerCase().includes(q)));
      document.getElementById('mCount').textContent = members.length;
      document.getElementById('mlist').innerHTML = list.map(m => `
        <li class="mitem ${m.id === currentId ? 'active' : ''}" data-id="${m.id}">
          <div class="mn">${esc(m.name || '(이름 없음)')} ${m.role === 'admin' ? '<span class="madm">관리자</span>' : ''}</div>
          <div class="me">${esc(m.email || '이메일 없음')}</div>
        </li>`).join('') || '<li style="color:var(--text-dim);font-size:13px;padding:8px">회원이 없습니다.</li>';
      document.querySelectorAll('.mitem').forEach(el => el.addEventListener('click', () => selectMember(el.dataset.id)));
    }

    async function selectMember(id) {
      currentId = id;
      renderMemberList();
      document.getElementById('emptyMain').style.display = 'none';
      const detail = document.getElementById('detail');
      detail.style.display = 'block';
      if (window.matchMedia('(max-width: 820px)').matches) {
        document.querySelector('.main').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      detail.innerHTML = '<div class="loading">불러오는 중…</div>';

      const m = members.find(x => x.id === id);
      const [{ data: records }, { data: recs }] = await Promise.all([
        sb().from('daily_records').select('day_number, status, comment').eq('member_id', id),
        sb().from('recordings').select('type, storage_path').eq('member_id', id),
      ]);
      const byDay = {}; (records || []).forEach(r => byDay[r.day_number] = r);
      const recMap = {}; (recs || []).forEach(r => recMap[r.type] = r.storage_path);

      const cohortOpts = ['<option value="">(미배정)</option>']
        .concat(cohorts.map(c => `<option value="${c.id}" ${m.cohort_id === c.id ? 'selected' : ''}>${esc(c.name)}</option>`)).join('');

      let daysHtml = '';
      for (let d = 1; d <= MONC.TOTAL_DAYS; d++) {
        const r = byDay[d] || {};
        const st = r.status || '';
        daysHtml += `
        <div class="drow" data-day="${d}">
          <div class="d-num">${d}일</div>
          <div class="seg" data-status="${st}">
            <button type="button" data-set="success" class="${st==='success'?'on-ok':''}">성공</button>
            <button type="button" data-set="fail" class="${st==='fail'?'on-no':''}">아쉬움</button>
            <button type="button" data-set="" class="${st===''?'on-clear':''}">미정</button>
          </div>
          <div class="d-comment"><input type="text" value="${esc(r.comment || '')}" placeholder="코멘트(선택)"></div>
          <div class="d-save"><button type="button" class="btn btn-action btn-sm">저장</button></div>
        </div>`;
      }

      detail.innerHTML = `
        <div class="panel">
          <h3>회원 정보</h3>
          <div class="prow">
            <div class="field"><label>이름</label><input id="fName" value="${esc(m.name || '')}" placeholder="이름"></div>
            <div class="field"><label>이메일</label><input value="${esc(m.email || '')}" readonly></div>
            <div class="field"><label>기수</label><select id="fCohort">${cohortOpts}</select></div>
            <div class="field"><label>권한</label><input value="${m.role === 'admin' ? '관리자' : '회원'}" readonly></div>
            <button class="btn btn-action" id="saveProfile">정보 저장</button>
          </div>
        </div>

        <div class="panel">
          <h3>날짜별 미션 (1~14일)</h3>
          <div id="daysEdit">${daysHtml}</div>
        </div>

        <div class="panel">
          <h3>Before / After 음성</h3>
          <div class="ba">
            ${baSlot('before', recMap.before)}
            ${baSlot('after', recMap.after)}
          </div>
        </div>`;

      wireDetail(id, recMap);
    }

    function baSlot(type, path) {
      const label = type === 'before' ? 'Before · 입과 전' : 'After · 수료 후';
      return `<div class="slot ${type}">
        <div class="tag">${label}</div>
        <div id="cur-${type}" class="cur">${path ? '등록됨: ' + esc(path) : '아직 없음'}</div>
        <div id="play-${type}"></div>
        <input type="file" id="file-${type}" accept="audio/*" style="font-size:12px;margin-top:8px;width:100%">
        <button class="btn btn-ghost btn-sm" data-upload="${type}" style="margin-top:8px">업로드</button>
      </div>`;
    }

    function wireDetail(id, recMap) {
      // 상태 세그먼트 토글
      document.querySelectorAll('#daysEdit .seg').forEach(seg => {
        seg.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
          const val = b.dataset.set;
          seg.dataset.status = val;
          seg.querySelectorAll('button').forEach(x => x.classList.remove('on-ok','on-no','on-clear'));
          b.classList.add(val === 'success' ? 'on-ok' : val === 'fail' ? 'on-no' : 'on-clear');
          seg.closest('.drow').classList.add('dirty');
        }));
      });
      document.querySelectorAll('#daysEdit .d-comment input').forEach(inp =>
        inp.addEventListener('input', () => inp.closest('.drow').classList.add('dirty')));

      // 날짜별 저장
      document.querySelectorAll('#daysEdit .d-save button').forEach(btn => btn.addEventListener('click', async () => {
        const row = btn.closest('.drow');
        const day = parseInt(row.dataset.day, 10);
        const status = row.querySelector('.seg').dataset.status;
        const comment = row.querySelector('.d-comment input').value.trim() || null;
        btn.disabled = true; btn.textContent = '…';
        try {
          if (!status) {
            // 미정 → 기존 기록 삭제
            await sb().from('daily_records').delete().eq('member_id', id).eq('day_number', day);
          } else {
            const { error } = await sb().from('daily_records')
              .upsert({ member_id: id, day_number: day, status, comment }, { onConflict: 'member_id,day_number' });
            if (error) throw error;
          }
          row.classList.remove('dirty');
          toast(day + '일차 저장됨');
        } catch (e) { alert('저장 실패: ' + e.message); }
        btn.disabled = false; btn.textContent = '저장';
      }));

      // 회원 정보 저장 (이름 + 기수)
      document.getElementById('saveProfile').addEventListener('click', async () => {
        const name = document.getElementById('fName').value.trim() || null;
        const cohort_id = document.getElementById('fCohort').value || null;
        const { error } = await sb().from('members').update({ name, cohort_id }).eq('id', id);
        if (error) { alert('저장 실패: ' + error.message); return; }
        const m = members.find(x => x.id === id); if (m) { m.name = name; m.cohort_id = cohort_id; }
        renderMemberList();
        toast('회원 정보 저장됨');
      });

      // 음성 업로드
      document.querySelectorAll('[data-upload]').forEach(btn => btn.addEventListener('click', async () => {
        const type = btn.dataset.upload;
        const file = document.getElementById('file-' + type).files[0];
        if (!file) { alert('파일을 선택하세요.'); return; }
        const ext = (file.name.split('.').pop() || 'mp3').toLowerCase();
        const path = `${id}/${type}.${ext}`;
        btn.disabled = true; btn.textContent = '업로드 중…';
        try {
          const up = await sb().storage.from('recordings').upload(path, file, { upsert: true });
          if (up.error) throw up.error;
          const { error } = await sb().from('recordings')
            .upsert({ member_id: id, type, storage_path: path }, { onConflict: 'member_id,type' });
          if (error) throw error;
          document.getElementById('cur-' + type).textContent = '등록됨: ' + path;
          const url = await MONC.getSignedUrl(path);
          document.getElementById('play-' + type).innerHTML = url ? `<audio controls src="${url}"></audio>` : '';
          toast((type === 'before' ? 'Before' : 'After') + ' 업로드 완료');
        } catch (e) { alert('업로드 실패: ' + e.message); }
        btn.disabled = false; btn.textContent = '업로드';
      }));

      // 기존 음성 미리듣기 링크 생성
      ['before','after'].forEach(async type => {
        if (recMap[type]) {
          const url = await MONC.getSignedUrl(recMap[type]);
          if (url) document.getElementById('play-' + type).innerHTML = `<audio controls preload="none" src="${url}"></audio>`;
        }
      });
    }

    // 기수 추가
    document.getElementById('addCohortBtn').addEventListener('click', async () => {
      const name = document.getElementById('cohortName').value.trim();
      if (!name) { alert('기수 이름을 입력하세요.'); return; }
      const { error } = await sb().from('cohorts').insert({ name });
      if (error) { alert('추가 실패: ' + error.message); return; }
      document.getElementById('cohortName').value = '';
      await loadCohorts();
      toast('기수 추가됨');
    });

    document.getElementById('search').addEventListener('input', renderMemberList);

    // ── 탭 전환 ──
    function initTabs() {
      document.querySelectorAll('.tabbtn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.tabbtn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('panel-' + b.dataset.tab).classList.add('active');
      }));
    }

    // ── 모집일정(challenge_rounds) CRUD ──
    const CH_LABEL = { voice:'보이스', expression:'표현력', spinning:'스피닝', answer:'답변' };

    async function loadRounds() {
      const listEl = document.getElementById('roundList');
      const { data, error } = await MONC.sb.from('challenge_rounds')
        .select('*').order('challenge').order('round');
      if (error) { listEl.innerHTML = '<div class="empty">불러오기 실패: ' + esc(error.message) + '</div>'; return; }
      if (!data.length) { listEl.innerHTML = '<div class="empty" style="color:var(--text-dim);padding:20px">등록된 모집일정이 없습니다.</div>'; return; }
      listEl.innerHTML = data.map(r => `
        <div class="round-item">
          <div>
            <div class="ri-main">${esc(CH_LABEL[r.challenge] || r.challenge)} ${r.round}기</div>
            <div class="ri-sub">모집 ${r.recruit_start} ~ ${r.recruit_end}${r.program_start ? ' · 시작 ' + r.program_start : ''}</div>
          </div>
          <button class="ri-del" data-id="${r.id}">삭제</button>
        </div>`).join('');
      listEl.querySelectorAll('.ri-del').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('이 기수를 삭제할까요?')) return;
        const { error } = await MONC.sb.from('challenge_rounds').delete().eq('id', b.dataset.id);
        if (error) { alert('삭제 실패: ' + error.message); return; }
        toast('삭제됨'); loadRounds();
      }));
    }

    document.getElementById('roundForm').addEventListener('submit', async e => {
      e.preventDefault();
      const row = {
        challenge: document.getElementById('rfChallenge').value,
        round: parseInt(document.getElementById('rfRound').value, 10),
        recruit_start: document.getElementById('rfStart').value,
        recruit_end: document.getElementById('rfEnd').value,
        program_start: document.getElementById('rfProgram').value || null,
      };
      if (!row.round || !row.recruit_start || !row.recruit_end) { alert('기수·모집 시작·마감을 입력하세요.'); return; }
      const { error } = await MONC.sb.from('challenge_rounds')
        .upsert(row, { onConflict: 'challenge,round' });
      if (error) { alert('저장 실패: ' + error.message); return; }
      toast('저장됨');
      document.getElementById('rfRound').value = '';
      loadRounds();
    });

    // ── 신청자 현황(applications) ──
    let _apps = [];
    function fmtDate(iso) { const d = new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function chSummary(challenges) {
      if (!Array.isArray(challenges)) return '';
      return challenges.map(c => `${CH_LABEL[c.challenge] || c.challenge || ''}${c.round ? ' ' + c.round + '기' : ''}`).join(', ');
    }

    async function loadApplications() {
      const body = document.getElementById('appsBody');
      const { data, error } = await MONC.sb.from('applications')
        .select('*').order('created_at', { ascending: false });
      if (error) { body.innerHTML = '<div class="empty">불러오기 실패: ' + esc(error.message) + '</div>'; return; }
      _apps = data || [];
      renderApps();
    }

    function renderApps() {
      const q = (document.getElementById('appSearch').value || '').trim().toLowerCase();
      const list = _apps.filter(a => !q
        || (a.name && a.name.toLowerCase().includes(q))
        || (a.phone && a.phone.includes(q))
        || chSummary(a.challenges).toLowerCase().includes(q));
      document.getElementById('appCount').textContent = `${list.length} / ${_apps.length}건`;
      const body = document.getElementById('appsBody');
      if (!list.length) { body.innerHTML = '<div class="empty" style="color:var(--text-dim);padding:24px">신청 내역이 없습니다.</div>'; return; }
      body.innerHTML = list.map(a => `
        <div class="app-card" data-id="${a.id}">
          <div class="ac-top">
            <span class="ac-name">${esc(a.name)}</span>
            <span class="ac-date">${fmtDate(a.created_at)}</span>
          </div>
          <div class="ac-phone">${esc(a.phone)} ${a.member_id ? '<span class="ac-linked">● 회원연결됨</span>' : '<span class="ac-unlinked">○ 미연결</span>'}</div>
          <div class="ac-ch">${esc(chSummary(a.challenges))} · ${(a.total_price||0).toLocaleString()}원</div>
          <div class="ac-toggles">
            <button class="ac-tg ${a.paid ? 'on' : ''}" data-field="paid">입금 ${a.paid ? '✓' : ''}</button>
            <button class="ac-tg ${a.refunded ? 'on on-refund' : ''}" data-field="refunded">환급 ${a.refunded ? '✓' : ''}</button>
            <button class="ac-del">삭제</button>
          </div>
        </div>`).join('');
      body.querySelectorAll('.ac-tg').forEach(btn => btn.addEventListener('click', async () => {
        const id = btn.closest('.app-card').dataset.id;
        const field = btn.dataset.field;
        const app = _apps.find(x => x.id === id);
        const next = !app[field];
        const { error } = await MONC.sb.from('applications').update({ [field]: next }).eq('id', id);
        if (error) { alert('저장 실패: ' + error.message); return; }
        app[field] = next; renderApps(); toast('저장됨');
      }));
      body.querySelectorAll('.ac-del').forEach(btn => btn.addEventListener('click', async () => {
        const id = btn.closest('.app-card').dataset.id;
        const app = _apps.find(x => x.id === id);
        if (!confirm(`'${app ? app.name : ''}' 신청을 삭제할까요? 되돌릴 수 없어요.`)) return;
        const { error } = await MONC.sb.from('applications').delete().eq('id', id);
        if (error) { alert('삭제 실패: ' + error.message); return; }
        _apps = _apps.filter(x => x.id !== id); renderApps(); toast('삭제됨');
      }));
    }

    function appsToCsv() {
      const head = ['신청일자','이름','전화','챌린지/기수','총액','입금','환급','회원연결'];
      const rows = _apps.map(a => [
        new Date(a.created_at).toLocaleString('ko-KR'), a.name, a.phone,
        chSummary(a.challenges), a.total_price || 0, a.paid ? 'Y':'N', a.refunded ? 'Y':'N', a.member_id ? 'Y':'N'
      ]);
      const csv = [head, ...rows].map(r => r.map(c => `"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `신청자_${new Date().toISOString().slice(0,10)}.csv`; a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('appSearch').addEventListener('input', renderApps);
    document.getElementById('appRefresh').addEventListener('click', loadApplications);
    document.getElementById('appCsv').addEventListener('click', appsToCsv);

    // ── 후기 관리(reviews) ──
    function rvUrl(path) { return MONC.sb.storage.from('reviews').getPublicUrl(path).data.publicUrl; }
    async function loadReviewsAdmin() {
      const grid = document.getElementById('rvGrid');
      const { data, error } = await MONC.sb.from('reviews').select('*').order('sort_order').order('created_at');
      if (error) { grid.innerHTML = '<div class="empty">불러오기 실패: ' + esc(error.message) + '</div>'; return; }
      if (!data.length) { grid.innerHTML = '<div class="empty" style="color:var(--text-dim);padding:20px">등록된 후기가 없습니다. 카톡 스크린샷을 업로드하세요.</div>'; return; }
      grid.innerHTML = data.map(r => `
        <div class="rv-item ${r.visible ? '' : 'hidden'}" data-id="${r.id}" data-path="${esc(r.image_path)}">
          <img src="${esc(rvUrl(r.image_path))}" alt="${esc(r.caption || '후기')}">
          <div class="rv-meta">
            <div class="row"><input type="number" class="rv-order" value="${r.sort_order}" title="순서"><button class="rv-btn rv-vis ${r.visible ? 'on' : ''}">${r.visible ? '노출' : '숨김'}</button></div>
            <div class="row"><button class="rv-btn rv-del">삭제</button></div>
          </div>
        </div>`).join('');
      grid.querySelectorAll('.rv-vis').forEach(b => b.addEventListener('click', async () => {
        const id = b.closest('.rv-item').dataset.id;
        const cur = b.classList.contains('on');
        const { error } = await MONC.sb.from('reviews').update({ visible: !cur }).eq('id', id);
        if (error) { alert('실패: ' + error.message); return; } loadReviewsAdmin();
      }));
      grid.querySelectorAll('.rv-order').forEach(inp => inp.addEventListener('change', async () => {
        const id = inp.closest('.rv-item').dataset.id;
        const { error } = await MONC.sb.from('reviews').update({ sort_order: parseInt(inp.value || '0', 10) }).eq('id', id);
        if (error) { alert('실패: ' + error.message); return; } toast('순서 저장');
      }));
      grid.querySelectorAll('.rv-del').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('이 후기를 삭제할까요?')) return;
        const it = b.closest('.rv-item'); const id = it.dataset.id; const path = it.dataset.path;
        await MONC.sb.storage.from('reviews').remove([path]);
        const { error } = await MONC.sb.from('reviews').delete().eq('id', id);
        if (error) { alert('삭제 실패: ' + error.message); return; } toast('삭제됨'); loadReviewsAdmin();
      }));
    }
    document.getElementById('rvUpload').addEventListener('click', async () => {
      const f = document.getElementById('rvFile').files[0];
      if (!f) { alert('이미지를 선택하세요.'); return; }
      const btn = document.getElementById('rvUpload'); btn.disabled = true; btn.textContent = '업로드 중…';
      try {
        const ext = (f.name.split('.').pop() || 'jpg').toLowerCase();
        const path = `${crypto.randomUUID()}.${ext}`;
        const up = await MONC.sb.storage.from('reviews').upload(path, f, { upsert: false });
        if (up.error) throw up.error;
        const caption = document.getElementById('rvCaption').value.trim() || null;
        const { error } = await MONC.sb.from('reviews').insert({ image_path: path, caption, sort_order: 0 });
        if (error) throw error;
        document.getElementById('rvFile').value = ''; document.getElementById('rvCaption').value = '';
        toast('업로드 완료'); loadReviewsAdmin();
      } catch (e) { alert('업로드 실패: ' + e.message); }
      btn.disabled = false; btn.textContent = '업로드';
    });

    // 진입 가드 + 초기 로드
    (async () => {
      const admin = await MONC.requireAdmin();
      if (!admin) return;
      await loadCohorts();
      await loadMembers();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('layout').style.display = 'grid';
      document.getElementById('tabs').style.display = 'flex';
      initTabs();
      loadRounds();
      loadApplications();
      loadReviewsAdmin();
    })();
  </script>
</body>
</html>
