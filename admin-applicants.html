<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 검색엔진 노출 방지 (관리자 전용) -->
  <meta name="robots" content="noindex, nofollow" />
  <title>MONC 신청자 현황</title>
  <style>
    :root {
      --bg: #F7F5F2; --surface: #FFFFFF; --line: #E7E1DA;
      --text: #241A12; --muted: #6B5744; --dim: #9A8B7C;
      --accent: #C9471E; --accent-tint: #FBEDE7;
      --ok: #16a34a; --ok-tint: #dcfce7; --warn: #B45309;
      --radius: 14px; --shadow: 0 6px 24px rgba(36,26,18,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
      font-size: 14px; line-height: 1.5;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: var(--accent); }

    /* ── 로그인 게이트 ── */
    #gate {
      min-height: 100vh; min-height: 100svh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .gate-card {
      background: var(--surface); border: 1px solid var(--line); border-radius: 20px;
      box-shadow: var(--shadow); padding: 36px 28px; width: 100%; max-width: 380px; text-align: center;
    }
    .gate-logo { font-size: 22px; font-weight: 900; letter-spacing: -.02em; }
    .gate-sub { color: var(--muted); margin: 6px 0 24px; font-size: 13px; }
    .field { text-align: left; margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
    input[type=password], input[type=text], input[type=date] {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 10px;
      font-size: 15px; font-family: inherit; background: #fff; color: var(--text);
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 18px; border-radius: 10px; border: none; font-weight: 800; font-size: 14px;
      background: var(--accent); color: #fff; transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .92; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: #fff; color: var(--text); border: 1.5px solid var(--line); }
    .btn-sm { padding: 7px 12px; font-size: 12.5px; font-weight: 700; border-radius: 8px; }
    .gate-full { width: 100%; margin-top: 6px; padding: 13px; }
    .gate-err { color: var(--accent); font-size: 13px; font-weight: 700; margin-top: 12px; min-height: 18px; }

    /* ── 앱 ── */
    #app { display: none; }
    header {
      position: sticky; top: 0; z-index: 10; background: rgba(247,245,242,.9);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    }
    .head-in { max-width: 1200px; margin: 0 auto; padding: 12px 18px; display: flex; align-items: center; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand img { height: 36px; width: auto; display: block; }
    .brand span { color: var(--accent); font-weight: 700; }
    .tabs { display: flex; gap: 4px; margin-left: 6px; flex: 1; overflow-x: auto; }
    .tab {
      padding: 8px 14px; border-radius: 9px; border: none; background: none; color: var(--muted);
      font-weight: 700; font-size: 13.5px; white-space: nowrap;
    }
    .tab.active { background: var(--accent-tint); color: var(--accent); }
    .tab:disabled { color: var(--dim); cursor: default; }
    .tab .soon { font-size: 10px; font-weight: 800; color: var(--dim); margin-left: 4px; }
    .logout { color: var(--muted); background: none; border: none; font-size: 12.5px; font-weight: 700; }

    main { max-width: 1200px; margin: 0 auto; padding: 20px 18px 60px; }
    .panel { display: none; }
    .panel.active { display: block; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
    .toolbar .search { flex: 1; min-width: 180px; }
    .count { font-size: 13px; color: var(--muted); font-weight: 700; }
    .count b { color: var(--text); }
    .spacer { flex: 1; }

    .table-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: auto; box-shadow: var(--shadow); }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    thead th {
      position: sticky; top: 0; background: #F1ECE6; text-align: left; padding: 11px 12px;
      font-weight: 800; color: var(--muted); white-space: nowrap; border-bottom: 1px solid var(--line);
    }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; white-space: nowrap; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #FBFAF8; }
    .chip { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 800; }
    .toggle {
      padding: 5px 11px; border-radius: 99px; border: 1.5px solid var(--line); background: #fff;
      color: var(--dim); font-size: 12px; font-weight: 800; white-space: nowrap;
    }
    .toggle.on { background: var(--ok-tint); border-color: transparent; color: var(--ok); }
    .toggle.on.refund { background: #FEF3C7; color: var(--warn); }
    .toggle:disabled { opacity: .5; }

    .empty, .loading { text-align: center; padding: 50px 20px; color: var(--dim); font-weight: 600; }
    .banner {
      background: var(--accent-tint); border: 1px solid #F3D6C9; color: #8A3A18;
      border-radius: 12px; padding: 12px 14px; font-size: 12.5px; margin-bottom: 16px; line-height: 1.6;
    }
    .placeholder { text-align: center; padding: 60px 20px; color: var(--dim); }
    .placeholder h3 { color: var(--muted); margin: 0 0 6px; }
    @media (max-width: 640px) {
      .head-in { flex-wrap: wrap; }
      .brand { width: auto; }
    }
  </style>
</head>
<body>

<!-- ══════════ 로그인 게이트 ══════════ -->
<div id="gate">
  <form class="gate-card" id="gateForm">
    <div class="gate-logo">MONC <span style="color:var(--accent)">관리자</span></div>
    <div class="gate-sub">관리자 비밀번호를 입력하세요</div>
    <div class="field">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" autocomplete="current-password" autofocus />
    </div>
    <button type="submit" class="btn gate-full" id="gateBtn">로그인</button>
    <div class="gate-err" id="gateErr"></div>
  </form>
</div>

<!-- ══════════ 관리 화면 ══════════ -->
<div id="app">
  <header>
    <div class="head-in">
      <div class="brand"><img src="images/몬크 로고/assets/MONC-symbol.svg" alt="MONC" /> <span>Admin</span></div>
      <nav class="tabs">
        <button class="tab active" data-tab="apps">신청자 현황</button>
        <button class="tab" data-tab="reviews" disabled>후기 <span class="soon">곧</span></button>
        <button class="tab" data-tab="recruit" disabled>모집일정 <span class="soon">곧</span></button>
      </nav>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <main>
    <!-- 신청자 현황 -->
    <section class="panel active" id="panel-apps">
      <div class="toolbar">
        <input type="text" class="search" id="search" placeholder="이름·전화·챌린지 검색…" />
        <span class="count" id="count"></span>
        <span class="spacer"></span>
        <button class="btn btn-ghost btn-sm" id="refreshBtn">새로고침</button>
        <button class="btn btn-sm" id="csvBtn">CSV 내보내기</button>
      </div>
      <div id="appsBody">
        <div class="loading">불러오는 중…</div>
      </div>
    </section>

    <section class="panel" id="panel-reviews">
      <div class="placeholder"><h3>후기 관리</h3><p>다음 단계에서 추가됩니다.</p></div>
    </section>
    <section class="panel" id="panel-recruit">
      <div class="placeholder"><h3>모집일정 관리</h3><p>다음 단계에서 추가됩니다.</p></div>
    </section>
  </main>
</div>

<script>
  // Apps Script 웹앱 주소 — 공개 사이트와 동일 (읽기/쓰기 게이트웨이)
  const API = "https://script.google.com/macros/s/AKfycbxrUFhRQvAAC3HZM8QuFCrrRfWRCQ8BA_j9-kvfLvW57QIroF0OsNahynY2Xi1RFnGz1w/exec";
  const PW_KEY = 'monc_admin_pw';

  const $ = s => document.querySelector(s);
  let PW = sessionStorage.getItem(PW_KEY) || '';
  let DATA = null; // { headers, rows:[{row, cells}], cols:{paid, refund, phone} }

  /* ── 로그인 ── */
  async function verify(pw) {
    const res = await fetch(API + '?action=admin_ping&pw=' + encodeURIComponent(pw));
    const j = await res.json();
    return j && j.ok;
  }
  $('#gateForm').addEventListener('submit', async e => {
    e.preventDefault();
    const pw = $('#pw').value.trim();
    const btn = $('#gateBtn'); const err = $('#gateErr');
    if (!pw) return;
    btn.disabled = true; btn.textContent = '확인 중…'; err.textContent = '';
    try {
      if (await verify(pw)) {
        PW = pw; sessionStorage.setItem(PW_KEY, pw);
        enterApp();
      } else {
        err.textContent = '비밀번호가 올바르지 않습니다.';
      }
    } catch (_) {
      err.textContent = '연결에 실패했습니다. 잠시 후 다시 시도하세요.';
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  });

  function enterApp() {
    $('#gate').style.display = 'none';
    $('#app').style.display = 'block';
    loadApps();
  }
  $('#logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem(PW_KEY); location.reload();
  });

  /* ── 탭 ── */
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    if (t.disabled) return;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    $('#panel-' + t.dataset.tab).classList.add('active');
  }));

  /* ── 신청자 현황 ── */
  async function loadApps() {
    $('#appsBody').innerHTML = '<div class="loading">불러오는 중…</div>';
    try {
      const res = await fetch(API + '?action=admin_apps&pw=' + encodeURIComponent(PW) + '&_=' + Date.now());
      const j = await res.json();
      if (!j.ok) { $('#appsBody').innerHTML = '<div class="empty">' + (j.error || '불러오지 못했습니다.') + '</div>'; return; }
      DATA = j;
      renderApps();
    } catch (_) {
      $('#appsBody').innerHTML = '<div class="empty">연결에 실패했습니다. 새로고침을 눌러보세요.</div>';
    }
  }

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function renderApps() {
    const q = $('#search').value.trim().toLowerCase();
    const { headers, rows, cols } = DATA;
    // 상태 컬럼(입금/환급)은 별도 토글로 렌더하므로 표 본문에선 제외
    const skip = new Set([cols.paid, cols.refund].filter(i => i != null && i >= 0));
    const showIdx = headers.map((_, i) => i).filter(i => !skip.has(i));

    let list = rows;
    if (q) list = rows.filter(r => r.cells.some(c => String(c).toLowerCase().includes(q)));
    // 최신순 (시트 아래쪽 = 최근이라 역순)
    list = list.slice().reverse();

    $('#count').innerHTML = '총 <b>' + rows.length + '</b>건' + (q ? (' · 검색 ' + list.length + '건') : '');

    if (!rows.length) { $('#appsBody').innerHTML = '<div class="empty">아직 신청 내역이 없습니다.</div>'; return; }

    let html = '<div class="table-wrap"><table><thead><tr>';
    showIdx.forEach(i => { html += '<th>' + esc(headers[i]) + '</th>'; });
    if (cols.paid != null) html += '<th>입금</th>';
    if (cols.refund != null) html += '<th>환급</th>';
    html += '</tr></thead><tbody>';

    list.forEach(r => {
      html += '<tr>';
      showIdx.forEach(i => { html += '<td>' + esc(r.cells[i]) + '</td>'; });
      if (cols.paid != null) html += '<td>' + toggleHtml(r, 'paid', r.cells[cols.paid]) + '</td>';
      if (cols.refund != null) html += '<td>' + toggleHtml(r, 'refund', r.cells[cols.refund]) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    $('#appsBody').innerHTML = html;

    $('#appsBody').querySelectorAll('.toggle').forEach(btn => {
      btn.addEventListener('click', () => setStatus(btn));
    });
  }

  function truthy(v) { const s = String(v).trim().toLowerCase(); return s === 'true' || s === 'y' || s === 'o' || s === '완료' || s === '확인' || s === '1'; }
  function toggleHtml(r, field, val) {
    const on = truthy(val);
    const label = field === 'paid' ? (on ? '입금완료' : '미입금') : (on ? '환급완료' : '미환급');
    return '<button class="toggle ' + (on ? 'on ' + (field === 'refund' ? 'refund' : '') : '') + '" data-row="' + r.row + '" data-field="' + field + '" data-on="' + on + '">' + label + '</button>';
  }

  async function setStatus(btn) {
    const row = +btn.dataset.row, field = btn.dataset.field, next = !(btn.dataset.on === 'true');
    btn.disabled = true;
    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'admin_setStatus', pw: PW, row, field, value: next })
      });
      const j = await res.json();
      if (j.ok) {
        // 로컬 데이터도 갱신
        const rec = DATA.rows.find(r => r.row === row);
        const ci = DATA.cols[field];
        if (rec && ci != null) rec.cells[ci] = next ? 'O' : '';
        renderApps();
      } else {
        alert(j.error || '저장에 실패했습니다.');
        btn.disabled = false;
      }
    } catch (_) {
      alert('연결에 실패했습니다.');
      btn.disabled = false;
    }
  }

  $('#search').addEventListener('input', () => { if (DATA) renderApps(); });
  $('#refreshBtn').addEventListener('click', loadApps);

  /* ── CSV 내보내기 ── */
  $('#csvBtn').addEventListener('click', () => {
    if (!DATA || !DATA.rows.length) return;
    const cell = v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
    const lines = [DATA.headers.map(cell).join(',')];
    DATA.rows.forEach(r => lines.push(r.cells.map(cell).join(',')));
    const blob = new Blob(['﻿' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'monc-신청자.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  /* ── 시작: 저장된 비밀번호 있으면 자동 진입 ── */
  (async function init() {
    if (PW) {
      try { if (await verify(PW)) { enterApp(); return; } } catch (_) {}
      sessionStorage.removeItem(PW_KEY); PW = '';
    }
    $('#pw').focus();
  })();
</script>
</body>
</html>
