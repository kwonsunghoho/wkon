<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>특강 — MONC 몬크</title>

  <!-- Microsoft Clarity — 방문자 행동 분석. 프로젝트 xlu6nkv2uh -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xlu6nkv2uh");

  <meta name="description" content="몬크가 주기적으로 여는 승무원 면접 특강. 신청 중인 특강을 한곳에서 보고 바로 신청하세요." />

  <!-- 파비콘 -->
  <link rel="icon" href="images/MONC_Logo_Full_Package/assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="images/MONC_Logo_Full_Package/assets/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/MONC_Logo_Full_Package/assets/favicon/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/MONC_Logo_Full_Package/assets/favicon/apple-touch-icon.png">
  <meta name="theme-color" content="#102B56">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; word-break: keep-all; overflow-wrap: break-word; }
    .container { max-width: 760px; margin: 0 auto; padding: 0 20px; }
    a { color: inherit; }

    /* NAV — briefing.html과 동일 패턴 */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 14px 0; background: rgba(233,228,216,.92); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-soft); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1120px; margin: 0 auto; padding: 0 20px; }
    .logo { display: flex; align-items: center; text-decoration: none; }
    .logo img { height: 22px; width: auto; display: block; }
    .nav-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; opacity: .8; transition: opacity .2s; min-height: 44px; }
    .nav-back:hover { opacity: 1; }

    /* HERO */
    .lx-hero { padding: 104px 0 12px; text-align: center; }
    .lx-eyebrow { font-size: 13px; font-weight: 800; letter-spacing: .24em; color: var(--accent-ink); }
    .lx-title { font-family: var(--serif); font-size: clamp(28px, 5vw, 42px); font-weight: 700; color: var(--accent); letter-spacing: -.6px; margin-top: 10px; }
    .lx-sub { font-size: 15px; color: var(--text); opacity: .72; margin-top: 12px; max-width: 34em; margin-left: auto; margin-right: auto; text-wrap: balance; }
    .lx-sub b { color: var(--action); font-weight: 800; white-space: nowrap; }

    /* 특강 카드 리스트 */
    .lx-grid { display: flex; flex-direction: column; gap: 14px; padding: 24px 0 80px; }
    .lx-card { position: relative; display: flex; gap: 16px; align-items: stretch; text-decoration: none; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 18px; box-shadow: 0 2px 10px rgba(38,34,28,.06); transition: box-shadow .2s, transform .2s; }
    .lx-card:hover { box-shadow: 0 12px 32px rgba(38,34,28,.14); transform: translateY(-2px); }
    .lx-card:focus-visible { outline: 3px solid var(--action); outline-offset: 2px; }
    .lx-card.is-closed { opacity: .62; }
    .lx-thumb { flex: 0 0 auto; width: 96px; height: 96px; border-radius: 14px; object-fit: cover; background: linear-gradient(135deg, var(--accent-tint), var(--surface2)); }
    .lx-thumb-ph { flex: 0 0 auto; width: 96px; height: 96px; border-radius: 14px; background: linear-gradient(135deg, #F2E3C8, #E7B98F); display: flex; align-items: center; justify-content: center; color: var(--accent-dark); }
    .lx-thumb-ph svg { width: 40px; height: 40px; opacity: .9; }
    .lx-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
    .lx-badge { align-self: flex-start; font-size: 11.5px; font-weight: 800; padding: 3px 10px; border-radius: 999px; margin-bottom: 6px; }
    .lx-badge.open { background: rgba(46,125,70,.14); color: #2E7D46; }
    .lx-badge.soon { background: var(--accent-tint); color: var(--accent-ink); }
    .lx-badge.closed { background: rgba(120,120,120,.14); color: #6b6b6b; }
    .lx-name { font-family: var(--serif); font-size: 19px; font-weight: 700; line-height: 1.32; }
    .lx-desc { font-size: 13.5px; color: var(--text-muted); margin-top: 4px; }
    .lx-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 10px; font-size: 13px; color: var(--text); }
    .lx-meta .m { display: inline-flex; align-items: center; gap: 5px; }
    .lx-meta .m svg { width: 14px; height: 14px; opacity: .7; }
    .lx-price { font-weight: 800; color: var(--accent-ink); }
    .lx-go { position: absolute; top: 16px; right: 16px; font-size: 18px; color: var(--accent-dark); opacity: .5; }
    .lx-card:hover .lx-go { opacity: 1; }

    /* 상태(로딩·비었음) */
    .lx-state { padding: 40px 0 90px; text-align: center; color: var(--text-muted); }
    .lx-state .em { font-family: var(--serif); font-size: 20px; color: var(--text); margin-bottom: 6px; }
    .lx-cta { display: inline-block; margin-top: 18px; padding: 13px 22px; border-radius: 999px; background: var(--action); color: var(--action-ink); font-weight: 800; text-decoration: none; }

    @media (max-width: 480px) {
      .lx-thumb, .lx-thumb-ph { width: 76px; height: 76px; }
      .lx-name { font-size: 17px; }
    }
    @media (prefers-reduced-motion: reduce) { .lx-card { transition: none; } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo"><img src="images/MONC_Logo_Full_Package/assets/web/monc-logo-transparent-640.webp" alt="MONC" /></a>
      <a href="index.html" class="nav-back">← 홈으로</a>
    </div>
  </nav>

  <header class="lx-hero">
    <div class="container">
      <div class="lx-eyebrow">SPECIAL LECTURE</div>
      <h1 class="lx-title">특강</h1>
      <p class="lx-sub">몬크가 주기적으로 여는 승무원 면접 특강 — <b>신청 중인 특강을 골라 바로 신청하세요.</b></p>
    </div>
  </header>

  <main class="container">
    <div class="lx-grid" id="lxGrid">
      <div class="lx-state" id="lxLoading">불러오는 중…</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="lecture-common.js"></script>
  <script>
    const grid = document.getElementById('lxGrid');

    function cardHtml(l) {
      const st = LEC.status(l.recruit_start, l.recruit_end);
      const badge = st === 'open'
        ? '<span class="lx-badge open">신청 중' + (LEC.ddaySuffix(l.recruit_end) || '') + '</span>'
        : st === 'upcoming'
          ? '<span class="lx-badge soon">신청 예정</span>'
          : '<span class="lx-badge closed">신청 마감</span>';
      const dateStr = LEC.fmtDate(l.lecture_date);
      const when = [dateStr, l.schedule_text].filter(Boolean).join(' · ');
      const thumb = l.thumb_url
        ? '<img class="lx-thumb" src="' + LEC.esc(l.thumb_url) + '" alt="" loading="lazy">'
        : '<span class="lx-thumb-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h13v14H6a2 2 0 0 1-2-2V5Z"/><path d="M17 8h3v9a2 2 0 0 1-2 2h-1"/><path d="M7 9h7M7 12.5h7M7 16h4"/></svg></span>';
      return '<a class="lx-card' + (st === 'closed' ? ' is-closed' : '') + '" href="lecture.html?id=' + encodeURIComponent(l.id) + '">'
        + thumb
        + '<div class="lx-body">'
        +   badge
        +   '<div class="lx-name">' + LEC.esc(l.title) + '</div>'
        +   (l.subtitle ? '<div class="lx-desc">' + LEC.esc(l.subtitle) + '</div>' : '')
        +   '<div class="lx-meta">'
        +     (when ? '<span class="m"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>' + LEC.esc(when) + '</span>' : '')
        +     '<span class="m lx-price">' + (l.price > 0 ? Number(l.price).toLocaleString() + '원' : '무료') + '</span>'
        +   '</div>'
        + '</div>'
        + '<span class="lx-go">→</span>'
        + '</a>';
    }

    async function load() {
      if (!window.MONC || !window.MONC.sb) {
        grid.innerHTML = '<div class="lx-state"><div class="em">특강을 불러오지 못했어요</div>잠시 후 새로고침해 주세요.</div>';
        return;
      }
      const { data, error } = await window.MONC.sb
        .from('special_lectures')
        .select('id, title, subtitle, recruit_start, recruit_end, lecture_date, schedule_text, price, thumb_url, sort_order')
        .eq('visible', true)
        .order('sort_order', { ascending: true })
        .order('lecture_date', { ascending: true, nullsFirst: false });

      if (error) {
        console.error('[특강] 조회 실패', error);
        grid.innerHTML = '<div class="lx-state"><div class="em">특강을 불러오지 못했어요</div>잠시 후 새로고침해 주세요.</div>';
        return;
      }
      if (!data || !data.length) {
        grid.innerHTML = '<div class="lx-state"><div class="em">준비 중인 특강이 곧 열려요</div>새로운 특강 소식은 챌린지·브리핑룸에서도 안내드릴게요.'
          + '<br><a class="lx-cta" href="index.html">홈으로</a></div>';
        return;
      }
      // 마감된 특강은 뒤로 (신청 중 → 예정 → 마감 순)
      const rank = l => { const s = LEC.status(l.recruit_start, l.recruit_end); return s === 'open' ? 0 : s === 'upcoming' ? 1 : 2; };
      data.sort((a, b) => rank(a) - rank(b));
      grid.innerHTML = data.map(cardHtml).join('');
    }
    load();
  </script>
</body>
</html>
