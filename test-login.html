<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONC 로그인 테스트</title>
  <style>
    body { font-family: -apple-system, "Malgun Gothic", sans-serif; max-width: 620px;
           margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #222; }
    h1 { font-size: 20px; }
    button { font-size: 16px; padding: 12px 20px; border: 0; border-radius: 10px;
             background: #0C8091; color: #fff; cursor: pointer; }
    button.logout { background: #888; }
    .box { background: #f5f5f7; border-radius: 12px; padding: 16px 20px; margin: 16px 0; }
    .label { color: #666; font-size: 13px; }
    .val { font-family: monospace; font-size: 15px; word-break: break-all;
           background: #fff; padding: 8px 10px; border-radius: 8px; display: block; margin: 4px 0 12px; }
    .ok { color: #1a7f37; font-weight: 700; }
    .err { color: #c0392b; white-space: pre-wrap; }
    .hint { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>MONC 로그인 테스트</h1>
  <p class="hint">이 페이지는 Supabase 설정이 잘 됐는지 확인하고, 관리자 계정을 준비하기 위한 임시 페이지입니다.</p>

  <div id="status" class="box">상태: 페이지 로딩 중…</div>

  <div id="loggedOut">
    <button id="loginBtn">구글로 로그인</button>
  </div>

  <div id="loggedIn" style="display:none;">
    <p class="ok">로그인 성공! 아래 값이 사장님 회원 정보입니다.</p>
    <div class="box">
      <div class="label">내 회원 ID (auth user id) — 관리자 지정에 사용</div>
      <span class="val" id="userId">-</span>
      <div class="label">이메일</div>
      <span class="val" id="userEmail">-</span>
      <div class="label">members 테이블에서 조회한 내 프로필 (RLS 통과 여부 확인)</div>
      <span class="val" id="memberRow">-</span>
    </div>
    <button class="logout" id="logoutBtn">로그아웃</button>
  </div>

  <div id="msg" class="err"></div>

  <script>
    // === 설정값 (공개용) ===
    const SUPABASE_URL = 'https://apzwauiumhmsvrgffjis.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwendhdWl1bWhtc3ZyZ2ZmamlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NzQ1ODYsImV4cCI6MjA5ODU1MDU4Nn0.RzqVWeNhGe3bWzEIwU1HZ7hjE1bhQxIxJcvSFTjrN_Y';

    const statusEl = document.getElementById('status');
    const msg = document.getElementById('msg');
    let sb = null;   // 우리 클라이언트. 라이브러리 전역명(window.supabase)과 겹치지 않게 이름 분리

    function setStatus(t) { statusEl.textContent = '상태: ' + t; }

    // 라이브러리 로드 후 초기화
    function init() {
      if (!window.supabase) { setStatus('라이브러리 로드됐지만 window.supabase 없음.'); return; }
      try {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } catch (e) {
        setStatus('클라이언트 생성 오류: ' + e.message);
        return;
      }
      setStatus('준비 완료 — "구글로 로그인" 버튼을 누르세요.');
      checkSession();
    }

    // 스크립트를 동적으로 로드(정적 태그 타이밍 문제 회피). 기본 실패 시 대체 CDN.
    function loadLib(url, onok, onfail) {
      const s = document.createElement('script');
      s.src = url; s.onload = onok; s.onerror = onfail;
      document.head.appendChild(s);
    }

    // 버튼 핸들러는 라이브러리와 무관하게 항상 연결
    document.getElementById('loginBtn').addEventListener('click', async () => {
      if (!sb) { setStatus('아직 라이브러리 준비 전입니다. 잠시 후 다시 눌러주세요.'); return; }
      setStatus('구글 로그인 창으로 이동 중…');
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href.split('#')[0].split('?')[0] }
      });
      if (error) { msg.textContent = '로그인 오류: ' + error.message; setStatus('로그인 오류'); }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (sb) await sb.auth.signOut();
      location.reload();
    });

    // 로그인 상태 확인
    async function checkSession() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return; // 로그인 전이면 버튼만 보여줌

      const user = session.user;
      document.getElementById('loggedOut').style.display = 'none';
      document.getElementById('loggedIn').style.display = 'block';
      document.getElementById('userId').textContent = user.id;
      document.getElementById('userEmail').textContent = user.email || '(이메일 없음)';
      setStatus('로그인됨');

      const { data, error } = await sb
        .from('members')
        .select('id, name, email, role, cohort_id')
        .eq('id', user.id)
        .single();
      document.getElementById('memberRow').textContent =
        error ? ('조회 실패: ' + error.message) : JSON.stringify(data, null, 2);
    }

    // 라이브러리 로드: jsdelivr → 실패 시 unpkg → 둘 다 실패 시 안내
    setStatus('로그인 라이브러리 불러오는 중…');
    loadLib('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2', init,
      () => loadLib('https://unpkg.com/@supabase/supabase-js@2', init,
        () => setStatus('로그인 라이브러리를 불러오지 못했습니다. 인터넷 연결이나 광고차단 확장 프로그램을 확인해주세요.')));
  </script>
</body>
</html>
