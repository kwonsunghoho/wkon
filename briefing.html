  <meta name="description" content="승무원 면접 준비 도구 모음 — 항공 뉴스, 소재 발굴, 답변노트. 비행 전 브리핑처럼, 면접 전에 여기서 준비해요." />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; word-break: keep-all; overflow-wrap: break-word; }
    .container { max-width: 760px; margin: 0 auto; padding: 0 20px; }
    a { color: inherit; }

    /* NAV — reviews.html과 동일 패턴 */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 14px 0; background: rgba(233,228,216,.92); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-soft); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1120px; margin: 0 auto; padding: 0 20px; }
    .logo { display: flex; align-items: center; text-decoration: none; }
    .logo img { height: 22px; width: auto; display: block; }
    .nav-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; opacity: .8; transition: opacity .2s; min-height: 44px; }
    .nav-back:hover { opacity: 1; }

    /* HERO */
    .bf-hero { padding: 104px 0 12px; text-align: center; }
    .bf-eyebrow { font-size: 13px; font-weight: 800; letter-spacing: .24em; color: var(--accent-ink); }
    .bf-title { font-family: var(--serif); font-size: clamp(28px, 5vw, 42px); font-weight: 700; color: var(--accent); letter-spacing: -.6px; margin-top: 10px; }
    /* 두 줄로 나뉠 땐 양쪽 길이를 비슷하게(balance), 구절은 통째로 유지(nowrap span) */
    .bf-sub { font-size: 15px; color: var(--text); opacity: .72; margin-top: 12px; max-width: 34em; margin-left: auto; margin-right: auto; text-wrap: balance; }
    .bf-sub b { color: var(--action); font-weight: 800; white-space: nowrap; }

    /* 도구 카드 */
    .bf-grid { display: flex; flex-direction: column; gap: 14px; padding: 24px 0 80px; }
    .bf-card { position: relative; display: block; text-decoration: none; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-md); padding: 22px 20px; box-shadow: 0 2px 10px rgba(38,34,28,.06); transition: box-shadow .2s, transform .2s; }
    .bf-card:hover { box-shadow: 0 12px 32px rgba(38,34,28,.14); transform: translateY(-2px); }
    .bf-card:focus-visible { outline: 3px solid var(--action); outline-offset: 2px; }
    .bf-head { display: flex; align-items: center; gap: 12px; }
    .bf-ico { flex: 0 0 auto; width: 46px; height: 46px; border-radius: 14px; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--accent-dark); }
    .bf-ico svg { width: 24px; height: 24px; }
    .bf-ico .win { width: 20px; height: 28px; }
    .bf-name { font-family: var(--serif); font-size: 19px; font-weight: 700; }
    .bf-badge { display: inline-block; font-size: 11.5px; font-weight: 800; padding: 3px 10px; border-radius: 999px; margin-left: 8px; vertical-align: 2px; }
    .bf-badge.open { background: rgba(46,125,70,.12); color: #2E7D46; }
    .bf-badge.member { background: var(--accent-tint); color: var(--accent-ink); }
    .bf-desc { font-size: 14px; color: var(--text-muted); margin-top: 10px; }
    .bf-go { position: absolute; top: 50%; right: 18px; transform: translateY(-50%); font-size: 18px; color: var(--accent-dark); opacity: .55; }
    .bf-card:hover .bf-go { opacity: 1; }

    @media (prefers-reduced-motion: reduce) { .bf-card { transition: none; } }
  </style>
</head>
<body>
  <!-- 몬크 로고 창문 심볼 — 뉴스 카드 아이콘 -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="moncWinG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E4E6E"/><stop offset=".36" stop-color="#7F7C9B"/><stop offset=".66" stop-color="#D6B389"/><stop offset="1" stop-color="#F2E3C8"/></linearGradient>
      <clipPath id="moncWinC"><rect x="18" y="18" width="64" height="104" rx="29" ry="31"/></clipPath>
      <symbol id="moncWin" viewBox="0 0 100 140">
        <rect x="4" y="4" width="92" height="132" rx="44" ry="46" fill="#1B2A4A"/>
        <rect x="11" y="11" width="78" height="118" rx="37" ry="39" fill="#F4F1EA"/>
        <g clip-path="url(#moncWinC)"><rect x="18" y="18" width="64" height="104" fill="url(#moncWinG)"/><ellipse cx="50" cy="104" rx="46" ry="20" fill="#F8ECD4" opacity=".7"/></g>
        <rect x="18" y="18" width="64" height="104" rx="29" ry="31" fill="none" stroke="#EDE7DB" stroke-width="2"/>
        <rect x="41" y="24" width="18" height="7" rx="3.5" fill="#ECE5D7" stroke="#B7AB93" stroke-width=".6"/>
      </symbol>
    </defs>
  </svg>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo"><img src="images/몬크 로고/assets/png/MONC-lockup-transparent.png" alt="MONC" /></a>
      <a href="index.html" class="nav-back">← 홈으로</a>
    </div>
  </nav>

  <header class="bf-hero">
    <div class="container">
      <div class="bf-eyebrow">BRIEFING ROOM</div>
      <h1 class="bf-title">브리핑룸</h1>
      <p class="bf-sub">승무원이 비행 전 브리핑을 하듯 — <b>면접 전에 여기서 준비해요.</b></p>
    </div>
  </header>

  <main class="container">
    <div class="bf-grid">

      <a class="bf-card" href="news.html">
        <div class="bf-head">
          <span class="bf-ico"><svg class="win" viewBox="0 0 100 140" aria-hidden="true"><use href="#moncWin"/></svg></span>
          <span class="bf-name">항공 뉴스<span class="bf-badge open">누구나</span></span>
        </div>
        <p class="bf-desc">국내 10개 항공사 소식을 한곳에서. 스크랩하면 항공사별로 쌓여 면접 답변 재료가 돼요.</p>
        <span class="bf-go">→</span>
      </a>

      <a class="bf-card" href="sojae.html">
        <div class="bf-head">
          <span class="bf-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/><path d="M11 8v6M8 11h6"/></svg></span>
          <span class="bf-name">소재 발굴<span class="bf-badge member">수강생 전용</span></span>
        </div>
        <p class="bf-desc">매일 한 질문씩, 내 경험에서 답변 소재를 캐요. AI 코치가 파고드는 질문으로 도와줘요.</p>
        <span class="bf-go">→</span>
      </a>

      <a class="bf-card" href="mypage.html#sec-answers">
        <div class="bf-head">
          <span class="bf-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><path d="M9 12h7M9 16h7"/></svg></span>
          <span class="bf-name">답변노트<span class="bf-badge member">회원 전용</span></span>
        </div>
        <p class="bf-desc">발굴한 소재가 나만의 면접 답변으로 쌓여요. 마이페이지에서 언제든 다시 봐요.</p>
        <span class="bf-go">→</span>
      </a>

      <!-- 실전 모의면접 — 기능 배포 보류 중(2026-07-20). 열 때 display:none만 제거 -->
      <a class="bf-card" href="rehearsal.html" style="display:none;" id="bfRehearsal">
        <div class="bf-head">
          <span class="bf-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M12 17v3M8 21h8"/></svg></span>
          <span class="bf-name">실전 모의면접<span class="bf-badge member">응시권 필요</span></span>
        </div>
        <p class="bf-desc">진짜 면접처럼 묻고, 끝나면 종합 첨삭을 받아요.</p>
        <span class="bf-go">→</span>
      </a>

    </div>
  </main>
</body>
</html>
