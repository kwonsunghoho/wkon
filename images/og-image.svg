<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F8"/>
      <stop offset="100%" style="stop-color:#FFEEF4"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D63384"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#FFB3C6"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative orbs -->
  <circle cx="950" cy="120" r="220" fill="#F9A8D4" opacity="0.35" filter="url(#blur1)"/>
  <circle cx="150" cy="500" r="180" fill="#FBCFE8" opacity="0.35" filter="url(#blur2)"/>
  <circle cx="600" cy="630" r="160" fill="#FFB3C6" opacity="0.2" filter="url(#blur2)"/>

  <!-- Dot pattern (subtle) -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1.5" fill="#D63384" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Card -->
  <rect x="80" y="60" width="1040" height="510" rx="32" fill="white" opacity="0.75"/>

  <!-- Left accent bar -->
  <rect x="80" y="60" width="8" height="510" rx="4" fill="url(#grad1)"/>

  <!-- Logo area -->
  <text x="148" y="148" font-family="'Apple SD Gothic Neo', sans-serif" font-size="48" font-weight="900" fill="#D63384">MONC</text>
  <text x="148" y="188" font-family="'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="600" fill="#7D4A66" opacity="0.8">목소리로 시작하는 2주 챌린지</text>

  <!-- Divider -->
  <line x1="148" y1="210" x2="700" y2="210" stroke="#D63384" stroke-width="1.5" opacity="0.2"/>

  <!-- Main headline -->
  <text x="148" y="285" font-family="'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="900" fill="#2D1022">오늘의 나를</text>
  <text x="148" y="350" font-family="'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="900">
    <tspan fill="#D63384">꺼내는</tspan><tspan fill="#2D1022"> 시간</tspan>
  </text>

  <!-- Sub description -->
  <text x="148" y="405" font-family="'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#7D4A66" opacity="0.9">목소리 · 눈빛 · 말투 · 첫인상, 하나씩 꺼내봐요</text>

  <!-- Challenge pills -->
  <rect x="148" y="440" width="158" height="44" rx="22" fill="url(#grad1)"/>
  <text x="227" y="467" text-anchor="middle" font-family="'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="white">🎙 보.신.각</text>

  <rect x="318" y="440" width="158" height="44" rx="22" fill="url(#grad2)"/>
  <text x="397" y="467" text-anchor="middle" font-family="'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="white">🗣 스.피.닝</text>

  <rect x="488" y="440" width="158" height="44" rx="22" fill="#FFE4EF" stroke="#D63384" stroke-width="1.5"/>
  <text x="567" y="467" text-anchor="middle" font-family="'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="#D63384">🎭 영.합.각</text>

  <rect x="658" y="440" width="158" height="44" rx="22" fill="#FFE4EF" stroke="#D63384" stroke-width="1.5"/>
  <text x="737" y="467" text-anchor="middle" font-family="'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="700" fill="#D63384">💬 승.자.각</text>

  <!-- Right side big emoji / icon area -->
  <circle cx="980" cy="315" r="155" fill="url(#grad1)" opacity="0.12"/>
  <circle cx="980" cy="315" r="115" fill="url(#grad1)" opacity="0.15"/>
  <text x="980" y="360" text-anchor="middle" font-size="110">🌸</text>

  <!-- Stats -->
  <text x="860" y="480" font-family="'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#7D4A66" text-anchor="middle" opacity="0.8">2주 완성</text>
  <text x="980" y="480" font-family="'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#7D4A66" text-anchor="middle" opacity="0.8">4가지 챌린지</text>
  <text x="1100" y="480" font-family="'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#7D4A66" text-anchor="middle" opacity="0.8">보증금 환급제</text>

  <!-- Bottom URL -->
  <text x="148" y="540" font-family="'Apple SD Gothic Neo', sans-serif" font-size="16" fill="#B08098" opacity="0.7">kwonsunghoho.github.io/wkon</text>
</svg>
