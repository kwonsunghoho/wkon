<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MONC — Logo</title>
<link rel="icon" type="image/svg+xml" href="MONC-favicon.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--navy:#1B2A4A;--ivory:#F4F1EA;--ivory-100:#FAF8F3;--rim:#EDE7DB;--gold:#C9A24B;--muted:#5A5A5F}
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--ivory);font-family:'Pretendard',system-ui,sans-serif;color:var(--navy);-webkit-font-smoothing:antialiased}
  a{color:var(--navy)}
  .sheet{max-width:1040px;margin:0 auto;padding:72px 40px 90px}
  .hero{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px 72px}
  .lk{display:flex;align-items:center;gap:6px;font-weight:300;font-size:112px;letter-spacing:1px;line-height:1;color:var(--navy)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--rim);border-radius:12px;overflow:hidden;box-shadow:0 10px 34px -20px rgba(27,42,74,.4)}
  .cell{padding:44px 20px 50px;display:flex;flex-direction:column;align-items:center;gap:24px;background:var(--ivory-100)}
  .cell + .cell{border-left:1px solid var(--rim)}
  .cell.alt{background:var(--ivory)}
  .cap{display:flex;flex-direction:column;align-items:center;gap:7px}
  .cap span{font-size:10px;letter-spacing:.24em;color:var(--muted)}
  .cap i{width:22px;height:1px;background:var(--gold);display:block}
  .rev{margin-top:26px;background:var(--navy);border-radius:12px;padding:46px 20px;display:flex;align-items:center;justify-content:center}
  .rev .lk{font-size:60px;color:var(--ivory)}
  .spec{margin-top:34px;display:flex;flex-wrap:wrap;gap:30px;justify-content:center;font-size:12.5px;color:var(--muted)}
  .spec b{font-weight:500;color:var(--navy)}
  .sw{width:14px;height:14px;border-radius:4px;display:inline-block;vertical-align:-2px;margin-right:7px}
  .foot{margin-top:40px;text-align:center;font-size:11px;letter-spacing:.02em;color:#8A8A8F}
</style>
</head>
<body>
<div class="sheet">

  <div class="hero">
    <div class="lk">
      <span>M</span>
      <svg width="72" height="100" viewBox="0 0 100 140" fill="none" style="display:block"><defs><linearGradient id="gh" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E4E6E"/><stop offset=".36" stop-color="#7F7C9B"/><stop offset=".66" stop-color="#D6B389"/><stop offset="1" stop-color="#F2E3C8"/></linearGradient><clipPath id="ch"><rect x="15" y="15" width="70" height="110" rx="31" ry="33"/></clipPath></defs><rect x="5" y="5" width="90" height="130" rx="41" ry="43" fill="#F4F1EA" stroke="#1B2A4A" stroke-width="3"/><g clip-path="url(#ch)"><rect x="15" y="15" width="70" height="110" fill="url(#gh)"/><ellipse cx="50" cy="106" rx="50" ry="22" fill="#F8ECD4" opacity=".7"/></g><rect x="15" y="15" width="70" height="110" rx="31" ry="33" fill="none" stroke="#EDE7DB" stroke-width="2"/><rect x="41" y="21" width="18" height="7" rx="3.5" fill="#ECE5D7" stroke="#B7AB93" stroke-width=".6"/></svg>
      <span>NC</span>
    </div>
  </div>

  <div class="row">
    <div class="cell">
      <div class="cap"><span>WORDMARK</span><i></i></div>
      <div class="lk" style="font-size:52px;gap:2px"><span>M</span><svg width="33" height="46" viewBox="0 0 100 140" fill="none" style="display:block"><defs><linearGradient id="gwm" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E4E6E"/><stop offset=".36" stop-color="#7F7C9B"/><stop offset=".66" stop-color="#D6B389"/><stop offset="1" stop-color="#F2E3C8"/></linearGradient><clipPath id="cwm"><rect x="15" y="15" width="70" height="110" rx="31" ry="33"/></clipPath></defs><rect x="5" y="5" width="90" height="130" rx="41" ry="43" fill="#F4F1EA" stroke="#1B2A4A" stroke-width="3"/><g clip-path="url(#cwm)"><rect x="15" y="15" width="70" height="110" fill="url(#gwm)"/><ellipse cx="50" cy="106" rx="50" ry="22" fill="#F8ECD4" opacity=".7"/></g><rect x="15" y="15" width="70" height="110" rx="31" ry="33" fill="none" stroke="#EDE7DB" stroke-width="2"/><rect x="41" y="21" width="18" height="7" rx="3.5" fill="#ECE5D7" stroke="#B7AB93" stroke-width=".6"/></svg><span>NC</span></div>
    </div>
    <div class="cell alt">
      <div class="cap"><span>SYMBOL MARK</span><i></i></div>
      <svg width="96" height="134" viewBox="0 0 100 140" fill="none" style="display:block"><defs><linearGradient id="gsm" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E4E6E"/><stop offset=".36" stop-color="#7F7C9B"/><stop offset=".66" stop-color="#D6B389"/><stop offset="1" stop-color="#F2E3C8"/></linearGradient><clipPath id="csm"><rect x="18" y="18" width="64" height="104" rx="29" ry="31"/></clipPath></defs><rect x="4" y="4" width="92" height="132" rx="44" ry="46" fill="#1B2A4A"/><rect x="11" y="11" width="78" height="118" rx="37" ry="39" fill="#F4F1EA"/><g clip-path="url(#csm)"><rect x="18" y="18" width="64" height="104" fill="url(#gsm)"/><ellipse cx="50" cy="104" rx="46" ry="20" fill="#F8ECD4" opacity=".7"/></g><rect x="18" y="18" width="64" height="104" rx="29" ry="31" fill="none" stroke="#EDE7DB" stroke-width="2"/><rect x="41" y="24" width="18" height="7" rx="3.5" fill="#ECE5D7" stroke="#B7AB93" stroke-width=".6"/></svg>
    </div>
    <div class="cell">
      <div class="cap"><span>FAVICON</span><i></i></div>
      <svg width="36" height="50" viewBox="0 0 100 140" fill="none" style="display:block"><defs><linearGradient id="gfv" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E4E6E"/><stop offset=".4" stop-color="#8480A0"/><stop offset="1" stop-color="#EFD9B6"/></linearGradient><clipPath id="cfv"><rect x="18" y="18" width="64" height="104" rx="29" ry="31"/></clipPath></defs><rect x="4" y="4" width="92" height="132" rx="44" ry="46" fill="#1B2A4A"/><rect x="12" y="12" width="76" height="116" rx="36" ry="38" fill="#F4F1EA"/><g clip-path="url(#cfv)"><rect x="18" y="18" width="64" height="104" fill="url(#gfv)"/></g><rect x="42" y="26" width="16" height="7" rx="3.5" fill="#ECE5D7"/></svg>
    </div>
  </div>

  <div class="rev">
    <div class="lk">
      <span>M</span>
      <svg width="38" height="53" viewBox="0 0 100 140" fill="none" style="display:block"><defs><linearGradient id="grv" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3E4E6E"/><stop offset=".36" stop-color="#7F7C9B"/><stop offset=".66" stop-color="#D6B389"/><stop offset="1" stop-color="#F2E3C8"/></linearGradient><clipPath id="crv"><rect x="15" y="15" width="70" height="110" rx="31" ry="33"/></clipPath></defs><rect x="5" y="5" width="90" height="130" rx="41" ry="43" fill="#F4F1EA" stroke="#F4F1EA" stroke-width="3"/><g clip-path="url(#crv)"><rect x="15" y="15" width="70" height="110" fill="url(#grv)"/><ellipse cx="50" cy="106" rx="50" ry="22" fill="#F8ECD4" opacity=".7"/></g><rect x="15" y="15" width="70" height="110" rx="31" ry="33" fill="none" stroke="#EDE7DB" stroke-width="2"/><rect x="41" y="21" width="18" height="7" rx="3.5" fill="#ECE5D7" stroke="#B7AB93" stroke-width=".6"/></svg>
      <span>NC</span>
    </div>
  </div>

  <div class="spec">
    <div><span class="sw" style="background:#1B2A4A"></span>Deep Navy <b>#1B2A4A</b></div>
    <div><span class="sw" style="background:#F4F1EA;border:1px solid #E1D9C9"></span>Ivory <b>#F4F1EA</b></div>
    <div><span class="sw" style="background:linear-gradient(#3E4E6E,#F2E3C8)"></span>Window <b>#3E4E6E→#F2E3C8</b></div>
    <div>Type · <b>Pretendard Light 300</b></div>
  </div>

  <div class="foot">MONC · Moment of New Career</div>

</div>
</body>
</html>
