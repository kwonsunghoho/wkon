<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MONC Logo Package Preview</title>
  <link rel="stylesheet" href="css/monc-logo.css">
  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  <meta name="theme-color" content="#102B56">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--monc-navy);
      background: #fff;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 20px clamp(20px, 5vw, 72px);
      border-bottom: 1px solid rgba(16, 43, 86, .12);
    }
    main {
      padding: 0 0 72px;
    }
    section {
      padding: 40px clamp(20px, 5vw, 72px);
    }
    h1, h2 { margin: 0 0 18px; }
    p { max-width: 760px; line-height: 1.7; }
    .checker {
      background-color: #ddd;
      background-image:
        linear-gradient(45deg, #bbb 25%, transparent 25%),
        linear-gradient(-45deg, #bbb 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #bbb 75%),
        linear-gradient(-45deg, transparent 75%, #bbb 75%);
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
    }
    .preview-box {
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: 48px;
      border-radius: 20px;
      overflow: hidden;
    }
    .preview-box img { max-width: 100%; height: auto; }
    .icon-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 24px;
    }
    .icon-card {
      display: grid;
      place-items: center;
      width: 180px;
      height: 180px;
      border-radius: 28px;
      background: var(--monc-ivory);
      box-shadow: 0 12px 36px rgba(16, 43, 86, .10);
    }
    .icon-card img { width: 120px; height: 120px; }
    code {
      background: rgba(16, 43, 86, .07);
      padding: .15em .4em;
      border-radius: .35em;
    }
  </style>
</head>
<body>
  <header>
    <picture class="monc-logo monc-logo--header">
      <source type="image/webp" srcset="assets/web/monc-logo-transparent-320.webp 320w, assets/web/monc-logo-transparent-640.webp 640w">
      <img src="assets/web/monc-logo-transparent-640.png" width="1130" height="335" alt="MONC">
    </picture>
    <strong>Logo Package Preview</strong>
  </header>

  <main>
    <section class="monc-logo-wrap">
      <img class="monc-logo" src="assets/svg/monc-logo-exact-transparent.svg" width="1130" height="335" alt="MONC">
    </section>

    <section>
      <h2>투명 배경 확인</h2>
      <div class="preview-box checker">
        <img src="assets/web/monc-logo-transparent-1130.png" width="1130" height="335" alt="MONC transparent logo">
      </div>
    </section>

    <section>
      <h2>앱 · 프로필 아이콘</h2>
      <div class="icon-row">
        <div class="icon-card"><img src="assets/favicon/android-chrome-192x192.png" alt="MONC app icon"></div>
        <div class="icon-card"><img src="assets/social/monc-profile-o-1080x1080.png" alt="MONC profile icon"></div>
      </div>
    </section>

    <section>
      <h2>권장 사용</h2>
      <p>
        홈페이지 헤더에는 <code>assets/web/monc-logo-transparent-640.webp</code>,
        큰 히어로 영역에는 <code>assets/svg/monc-logo-exact-transparent.svg</code>,
        SNS 공유 이미지에는 <code>assets/social/monc-og-image-1200x630.png</code>를 사용하세요.
      </p>
    </section>
  </main>
</body>
</html>
