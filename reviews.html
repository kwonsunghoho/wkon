<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실제 후기 — MONC 몬크 챌린지</title>

  <!-- Microsoft Clarity — 방문자 행동 분석(세션 녹화·히트맵·이탈 지점). 프로젝트 xlu6nkv2uh -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xlu6nkv2uh");
  </script>
  <meta name="description" content="MONC 몬크 챌린지 실제 참여자 후기 모음. 기수별·챌린지별로 진짜 후기를 확인하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Song+Myung&display=swap" rel="stylesheet">
  <!-- 파비콘 -->
  <link rel="icon" href="images/MONC_logo_package/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="images/MONC_logo_package/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/MONC_logo_package/favicon-32x32.png">
  <link rel="apple-touch-icon" href="images/MONC_logo_package/favicon-256x256.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    .container { max-width: 1120px; margin: 0 auto; padding: 0 20px; }
    a { color: inherit; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 14px 0; background: rgba(233,228,216,.92); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-soft); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1120px; margin: 0 auto; padding: 0 20px; }
    .logo { display: flex; align-items: center; text-decoration: none; }
    .logo img { height: 22px; width: auto; display: block; }
    .nav-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; opacity: .8; transition: opacity .2s; min-height: 44px; }
    .nav-back:hover { opacity: 1; }

    /* HERO */
    .rv-hero { padding: 104px 0 24px; text-align: center; }
    .rv-eyebrow { font-size: 13px; font-weight: 800; letter-spacing: .24em; color: var(--accent-ink); }
    .rv-title { font-family: var(--serif); font-size: clamp(28px, 5vw, 42px); font-weight: 700; color: var(--accent); letter-spacing: -.6px; margin-top: 10px; }
    .rv-sub { font-size: 15px; color: var(--text); opacity: .72; margin-top: 12px; }
    .rv-sub b { color: var(--action); font-weight: 800; }

    /* FILTER BAR */
    .rv-filters { position: sticky; top: 58px; z-index: 50; background: rgba(233,228,216,.92); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); padding: 14px 0 12px; margin-bottom: 8px; border-bottom: 1px solid var(--border-soft); }
    .rv-filter-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .rv-filter-row + .rv-filter-row { margin-top: 8px; }
    .rv-filter-label { font-size: 12px; font-weight: 800; color: var(--text); opacity: .55; margin-right: 4px; min-width: 42px; }
    .rv-chip {
      appearance: none; cursor: pointer; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text); font: inherit;
      font-size: 13px; font-weight: 700; padding: 8px 15px; border-radius: 999px;
      min-height: 40px; transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .rv-chip:hover { border-color: var(--accent-dark); }
    .rv-chip.active { background: var(--accent-ink); color: #fff; border-color: var(--accent-ink); }
    .rv-chip .rv-chip-n { opacity: .6; font-weight: 700; margin-left: 3px; }
    .rv-chip.active .rv-chip-n { opacity: .8; }
    .rv-chip:focus-visible { outline: 3px solid var(--action); outline-offset: 2px; }

    /* GRID (masonry via CSS columns — 텍스트 스크린샷이라 크롭 없이 원본 비율 유지) */
    .rv-count { font-size: 13px; font-weight: 700; color: var(--text); opacity: .6; margin: 16px 2px 14px; }
    .rv-masonry { column-count: 3; column-gap: 16px; padding-bottom: 60px; }
    .rv-card {
      break-inside: avoid; margin-bottom: 16px; background: var(--surface);
      border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
      overflow: hidden; box-shadow: 0 2px 10px rgba(38,34,28,.06);
      cursor: zoom-in; transition: box-shadow .2s, transform .2s;
    }
    .rv-card:hover { box-shadow: 0 10px 30px rgba(38,34,28,.14); transform: translateY(-2px); }
    .rv-card img { width: 100%; height: auto; display: block; background: var(--surface2); }
    .rv-card-cap { display: flex; align-items: center; gap: 6px; padding: 10px 12px; flex-wrap: wrap; }
    .rv-tag { font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 999px; background: rgba(217,83,31,.10); color: var(--accent-ink); }
    .rv-tag-cohort { background: rgba(242,121,69,.14); color: var(--action-ink); }
    .rv-empty { text-align: center; padding: 60px 20px; color: var(--text); opacity: .6; font-size: 15px; }
    .rv-skeleton { border-radius: var(--radius-sm); background: var(--surface2); margin-bottom: 16px; break-inside: avoid; }

    /* LIGHTBOX — 텍스트 스크린샷이라 높이에 맞춰 줄이면 글씨가 작아진다.
       폭 기준으로 크게 띄우고(세로로 길면 스크롤), 이미지를 탭하면 더 확대. */
    .rv-lb { position: fixed; inset: 0; z-index: 300; overflow: auto; text-align: center; padding: 24px 16px 40px; background: rgba(20,15,10,.82); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); -webkit-overflow-scrolling: touch; }
    .rv-lb[hidden] { display: none; }
    .rv-lb img { display: inline-block; width: min(94vw, 820px); height: auto; max-width: none; border-radius: 12px; background: #fff; box-shadow: 0 24px 70px rgba(0,0,0,.5); cursor: zoom-in; }
    .rv-lb img.zoomed { width: min(170vw, 1300px); cursor: zoom-out; }   /* 탭 시 확대(화면보다 넓어지면 좌우 스크롤) */
    .rv-lb-close { position: fixed; top: 14px; right: 16px; z-index: 2; width: 46px; height: 46px; border-radius: 50%; border: 0; background: rgba(255,255,255,.22); color: #fff; font-size: 26px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .rv-lb-close:hover { background: rgba(255,255,255,.34); }
    .rv-lb-close:focus-visible { outline: 2px solid var(--action); outline-offset: 2px; }
    .rv-lb-hint {
      position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 2;
      display: inline-flex; align-items: center; gap: 7px; max-width: calc(100vw - 32px);
      padding: 10px 18px; border-radius: 999px;
      background: rgba(20,15,10,.85); color: #fff;
      font-size: 13.5px; font-weight: 800; letter-spacing: -.01em; white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,.4); pointer-events: none;
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    }
    .rv-lb-hint svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--action); }
    @media (prefers-reduced-motion: reduce) { .rv-lb { scroll-behavior: auto; } }

    /* CTA 하단 */
    .rv-foot { text-align: center; padding: 20px 0 72px; }
    .rv-foot-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 52px; padding: 15px 34px; border-radius: 999px; background: var(--action); color: var(--action-ink); font-size: 16px; font-weight: 800; text-decoration: none; box-shadow: 0 10px 28px rgba(242,121,69,.35); transition: transform .2s; }
    .rv-foot-btn:hover { transform: translateY(-2px); }

    @media (max-width: 900px) { .rv-masonry { column-count: 2; } }
    @media (max-width: 560px) {
      .rv-masonry { column-count: 1; column-gap: 0; }
      .rv-filter-label { min-width: 100%; margin-bottom: 2px; }
      .rv-filters { top: 56px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rv-card, .rv-foot-btn { transition: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo"><img src="images/MONC_logo_package/MONC_wordmark_1000px_transparent.png" alt="MONC" /></a>
      <a href="index.html" class="nav-back">← 홈으로</a>
    </div>
  </nav>

  <header class="rv-hero">
    <div class="container">
      <div class="rv-eyebrow">REAL REVIEWS</div>
      <h1 class="rv-title">실제 후기</h1>
      <p class="rv-sub">몬크 챌린지에 진짜 참여한 분들의 후기예요. <b id="rvTotal">불러오는 중…</b></p>
    </div>
  </header>

  <div class="rv-filters" id="rvFilters" hidden>
    <div class="container">
      <div class="rv-filter-row" id="rvChallengeRow">
        <span class="rv-filter-label">챌린지</span>
      </div>
      <div class="rv-filter-row" id="rvCohortRow">
        <span class="rv-filter-label">기수</span>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="rv-count" id="rvCount"></div>
    <div class="rv-masonry" id="rvGrid">
      <!-- 스켈레톤 -->
      <div class="rv-skeleton" style="height:320px"></div>
      <div class="rv-skeleton" style="height:240px"></div>
      <div class="rv-skeleton" style="height:400px"></div>
      <div class="rv-skeleton" style="height:280px"></div>
      <div class="rv-skeleton" style="height:360px"></div>
      <div class="rv-skeleton" style="height:220px"></div>
    </div>
    <div class="rv-empty" id="rvEmpty" hidden>선택한 조건의 후기가 없어요.</div>

    <div class="rv-foot">
      <a class="rv-foot-btn" href="apply.html">나도 도전하기 →</a>
    </div>
  </main>

  <!-- 원본 라이트박스 (폭 기준 확대 + 탭 시 더 확대) -->
  <div class="rv-lb" id="rvLightbox" hidden role="dialog" aria-modal="true" aria-label="후기 원본">
    <button class="rv-lb-close" type="button" aria-label="닫기">&times;</button>
    <img src="" alt="">
    <div class="rv-lb-hint" id="rvLbHint">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.7"/><path d="M13 13l4 4M6.5 8.5h4M8.5 6.5v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      이미지를 누르면 더 크게 볼 수 있어요
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
  (function () {
    const CH_ORDER = ['보신각', '영합각', '스피닝', '승자각'];
    const grid = document.getElementById('rvGrid');
    const emptyEl = document.getElementById('rvEmpty');
    const countEl = document.getElementById('rvCount');
    const filtersEl = document.getElementById('rvFilters');
    const esc = (s) => (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    let items = [];                // {url, challenge, cohort, name, date}
    let fChallenge = 'all';        // 선택된 챌린지
    let fCohort = 'all';           // 선택된 기수('all' | 숫자 | 'none')

    function imgUrl(path) { return MONC.sb.storage.from('reviews').getPublicUrl(path).data.publicUrl; }

    async function load() {
      if (!window.MONC || !window.MONC.sb) { grid.innerHTML = ''; emptyEl.hidden = false; emptyEl.textContent = '후기를 불러올 수 없어요.'; return; }
      // select('*') — challenge/cohort 컬럼이 아직 없어도(마이그레이션 전) 에러 없이 있는 컬럼만 반환.
      const { data, error } = await MONC.sb.from('reviews').select('*').eq('visible', true);
      if (error) { console.warn('후기 로드 실패:', error); grid.innerHTML = ''; emptyEl.hidden = false; emptyEl.textContent = '후기를 불러오지 못했어요.'; return; }
      items = (data || []).map(r => ({
        url: imgUrl(r.image_path),
        challenge: r.challenge || null,
        cohort: (r.cohort != null && r.cohort !== 0) ? Number(r.cohort) : null,
        name: r.reviewer_name || '',
        date: r.review_date || r.created_at || '',
      }));
      // 정렬: 챌린지 순 → 기수 오름차순 → 날짜 오름차순
      items.sort((a, b) => {
        const ca = CH_ORDER.indexOf(a.challenge), cb = CH_ORDER.indexOf(b.challenge);
        if (ca !== cb) return (ca < 0 ? 99 : ca) - (cb < 0 ? 99 : cb);
        if ((a.cohort || 99) !== (b.cohort || 99)) return (a.cohort || 99) - (b.cohort || 99);
        return String(a.date).localeCompare(String(b.date));
      });
      document.getElementById('rvTotal').textContent = `총 ${items.length}개`;
      buildFilters();
      render();
    }

    function buildFilters() {
      const chSet = CH_ORDER.filter(ch => items.some(i => i.challenge === ch));
      const coSet = [...new Set(items.map(i => i.cohort).filter(v => v != null))].sort((a, b) => a - b);
      const hasNoCohort = items.some(i => i.cohort == null);
      // 분류 데이터가 하나도 없으면(마이그레이션 전) 필터바 숨김 — 전체 그리드만 노출
      if (!chSet.length && !coSet.length) { filtersEl.hidden = true; return; }
      filtersEl.hidden = false;

      const chRow = document.getElementById('rvChallengeRow');
      const coRow = document.getElementById('rvCohortRow');
      chRow.querySelectorAll('.rv-chip').forEach(n => n.remove());
      coRow.querySelectorAll('.rv-chip').forEach(n => n.remove());

      const mkChip = (label, val, kind, count) => {
        const b = document.createElement('button');
        b.className = 'rv-chip' + (((kind === 'ch' ? fChallenge : fCohort) === val) ? ' active' : '');
        b.type = 'button';
        b.dataset.kind = kind; b.dataset.val = val;
        b.innerHTML = esc(label) + (count != null ? ` <span class="rv-chip-n">${count}</span>` : '');
        return b;
      };
      chRow.appendChild(mkChip('전체', 'all', 'ch', items.length));
      chSet.forEach(ch => chRow.appendChild(mkChip(ch, ch, 'ch', items.filter(i => i.challenge === ch).length)));
      coRow.appendChild(mkChip('전체', 'all', 'co', null));
      coSet.forEach(co => coRow.appendChild(mkChip(co + '기', String(co), 'co', null)));
      if (hasNoCohort) coRow.appendChild(mkChip('기수 미상', 'none', 'co', null));

      filtersEl.querySelectorAll('.rv-chip').forEach(chip => chip.addEventListener('click', () => {
        if (chip.dataset.kind === 'ch') fChallenge = chip.dataset.val; else fCohort = chip.dataset.val;
        filtersEl.querySelectorAll('.rv-chip').forEach(c => {
          const sel = c.dataset.kind === 'ch' ? fChallenge : fCohort;
          c.classList.toggle('active', c.dataset.val === sel);
        });
        render();
      }));
    }

    function matches(i) {
      if (fChallenge !== 'all' && i.challenge !== fChallenge) return false;
      if (fCohort === 'none') { if (i.cohort != null) return false; }
      else if (fCohort !== 'all' && String(i.cohort) !== fCohort) return false;
      return true;
    }

    function render() {
      const list = items.filter(matches);
      countEl.textContent = list.length ? `${list.length}개 후기` : '';
      if (!list.length) { grid.innerHTML = ''; emptyEl.hidden = false; return; }
      emptyEl.hidden = true;
      grid.innerHTML = list.map(i => {
        const chip = i.challenge ? `<span class="rv-tag">${esc(i.challenge)}</span>` : '';
        const co = i.cohort != null ? `<span class="rv-tag rv-tag-cohort">${i.cohort}기</span>` : '';
        const cap = (chip || co) ? `<div class="rv-card-cap">${chip}${co}</div>` : '';
        const alt = `${esc(i.challenge || '')} ${i.cohort ? i.cohort + '기' : ''} ${esc(i.name)} 후기`.trim();
        return `<figure class="rv-card js-open" data-src="${esc(i.url)}" data-alt="${esc(alt)}">
          <img src="${esc(i.url)}" alt="${esc(alt)}" loading="lazy">${cap}
        </figure>`;
      }).join('');
    }

    /* 라이트박스 — 폭 기준 확대(세로로 길면 스크롤), 이미지 탭 시 더 확대/원복 */
    (function initLb() {
      const lb = document.getElementById('rvLightbox');
      const lbImg = lb.querySelector('img');
      const closeBtn = lb.querySelector('.rv-lb-close');
      const hint = document.getElementById('rvLbHint');
      let trigger = null;
      function open(src, alt, el) {
        trigger = el; lbImg.src = src; lbImg.alt = alt || '후기 원본';
        lbImg.classList.remove('zoomed'); if (hint) hint.style.display = '';
        lb.hidden = false; lb.scrollTop = 0; document.body.style.overflow = 'hidden'; closeBtn.focus();
      }
      function close() {
        lb.hidden = true; lbImg.removeAttribute('src'); lbImg.classList.remove('zoomed');
        document.body.style.overflow = ''; if (trigger) { trigger.focus(); trigger = null; }
      }
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.js-open'); if (!card) return;
        open(card.dataset.src, card.dataset.alt, card);
      });
      // 이미지 탭 → 확대 토글(닫기로 전파되지 않게 처리). 확대 후엔 안내 문구 숨김.
      lbImg.addEventListener('click', (e) => {
        e.stopPropagation();
        const z = lbImg.classList.toggle('zoomed');
        if (hint) hint.style.display = z ? 'none' : '';
      });
      closeBtn.addEventListener('click', close);
      lb.addEventListener('click', (e) => { if (e.target === lb) close(); }); // 이미지 바깥(오버레이) 클릭 닫기
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !lb.hidden) close(); });
    })();

    load();
  })();
  </script>
</body>
</html>
