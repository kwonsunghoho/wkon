<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>후기 일괄 업로드 (일회용)</title>
  <!-- ⚠️ 일회용 도구: 후기(reviews) 대량 최초 업로드용. admin.html 기존 기능과 무관.
       업로드 끝나면 이 파일은 삭제해도 됩니다. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      --bg: #E9E4D8; --card: #fff; --text: #26221C; --dim: #6b6459;
      --action: #F27945; --action-ink: #2A1206; --accent: #194192;
      --line: #d8d2c4; --ok: #1f7a4d; --err: #c0392b;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.5;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 80px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--dim); font-size: 14px; margin: 0 0 20px; }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
    }
    .btn {
      appearance: none; border: 0; cursor: pointer; font-weight: 800;
      border-radius: 12px; padding: 12px 18px; font-size: 15px;
    }
    .btn-primary { background: var(--action); color: var(--action-ink); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .muted { color: var(--dim); font-size: 13px; }
    label.field { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
    input[type=number] { width: 72px; padding: 8px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; }

    /* 드롭존 */
    .drop {
      border: 2px dashed var(--line); border-radius: var(--radius);
      padding: 28px 16px; text-align: center; color: var(--dim);
      background: #fff; cursor: pointer; transition: border-color .15s, background .15s;
    }
    .drop.drag { border-color: var(--action); background: #fff8f4; color: var(--text); }
    .drop strong { color: var(--accent); }

    /* 진행바 */
    .bar { height: 10px; background: #eee; border-radius: 999px; overflow: hidden; margin: 12px 0 6px; }
    .bar > i { display: block; height: 100%; width: 0; background: var(--action); transition: width .2s; }

    /* 파일 목록 */
    ul.files { list-style: none; margin: 12px 0 0; padding: 0; }
    ul.files li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-top: 1px solid var(--line); font-size: 14px;
    }
    ul.files li:first-child { border-top: 0; }
    .thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #eee; flex-shrink: 0; }
    .fname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .st { font-size: 12px; font-weight: 700; white-space: nowrap; }
    .st.wait { color: var(--dim); }
    .st.work { color: var(--accent); }
    .st.done { color: var(--ok); }
    .st.fail { color: var(--err); }
    .summary { font-size: 15px; font-weight: 800; }
    .summary .ok { color: var(--ok); }
    .summary .err { color: var(--err); }
    code { background: #f1ece0; padding: 1px 6px; border-radius: 6px; font-size: 13px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>후기 일괄 업로드</h1>
    <p class="sub">일회용 도구입니다. 스크린샷을 여러 장 선택하면 자동으로 모바일 최적화(긴 변 1080px + 압축) 후 <code>reviews</code>에 올립니다.</p>

    <!-- 로그인 게이트 -->
    <div id="gate" class="card">
      <div id="gateMsg" class="muted">세션 확인 중…</div>
      <div id="gateActions" class="row" style="margin-top:12px;"></div>
    </div>

    <!-- 업로더 -->
    <div id="uploader" class="hidden">
      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <div class="row">
            <label class="field">시작 순서(sort_order)
              <input type="number" id="startOrder" value="0" min="0">
            </label>
          </div>
          <div class="muted" id="who"></div>
        </div>
        <div id="drop" class="drop" style="margin-top:14px;">
          <div><strong>클릭하거나 여기로 드래그</strong>해서 후기 스크린샷을 선택하세요.</div>
          <div class="muted" style="margin-top:6px;">여러 장 한꺼번에 선택 가능 · PNG/JPG 권장</div>
          <input type="file" id="file" accept="image/*" multiple class="hidden">
        </div>
      </div>

      <div id="listCard" class="card hidden">
        <div class="row" style="justify-content:space-between;">
          <div class="summary" id="counts">선택됨 0장</div>
          <button class="btn btn-primary" id="start" disabled>업로드 시작</button>
        </div>
        <div class="bar"><i id="progress"></i></div>
        <div class="muted" id="progressText"></div>
        <ul class="files" id="files"></ul>
      </div>

      <div id="doneCard" class="card hidden">
        <div class="summary" id="doneSummary"></div>
        <div class="muted" style="margin-top:8px;">index.html 마키에는 <code>visible=true</code> 후기가 바로 뜹니다. 순서 조정·숨김은 <code>admin.html → 후기 관리</code>에서 가능합니다.</div>
        <div class="row" style="margin-top:12px;">
          <button class="btn btn-ghost" id="again">더 올리기</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (b) => b >= 1024 * 1024 ? (b / 1024 / 1024).toFixed(1) + 'MB'
                     : b >= 1024 ? Math.round(b / 1024) + 'KB' : b + 'B';

    let selected = [];     // { file, li, statusEl, id }
    let running = false;

    // ── 인증 게이트 ─────────────────────────────────────────────
    async function initAuth() {
      if (!window.MONC || !window.MONC.sb) {
        $('gateMsg').textContent = 'Supabase 초기화 실패 — supabase-config.js 로드 순서를 확인하세요.';
        return;
      }
      const session = await MONC.getSession();
      if (!session) return showLogin('로그인이 필요합니다. 관리자(구글) 계정으로 로그인하세요.');
      const profile = await MONC.getMyProfile();
      if (!profile || profile.role !== 'admin') {
        return showLogin('이 계정은 관리자가 아닙니다. 관리자 계정으로 다시 로그인하세요.', true);
      }
      openUploader(profile);
    }

    function showLogin(msg, canLogout) {
      $('gateMsg').textContent = msg;
      const actions = $('gateActions');
      actions.innerHTML = '';
      const g = document.createElement('button');
      g.className = 'btn btn-primary'; g.textContent = '구글로 로그인';
      g.onclick = () => MONC.signInWithGoogle(location.href);
      actions.appendChild(g);
      if (canLogout) {
        const o = document.createElement('button');
        o.className = 'btn btn-ghost'; o.textContent = '다른 계정으로';
        o.onclick = async () => { await MONC.sb.auth.signOut(); location.reload(); };
        actions.appendChild(o);
      }
    }

    function openUploader(profile) {
      $('gate').classList.add('hidden');
      $('uploader').classList.remove('hidden');
      $('who').textContent = (profile.name || '') + ' · ' + (profile.email || '') + ' (admin)';
    }

    // ── 파일 선택 (클릭 + 드래그&드롭) ──────────────────────────
    const drop = $('drop'), fileInput = $('file');
    drop.addEventListener('click', () => fileInput.click());
    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('drag'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault(); drop.classList.remove('drag');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => addFiles(fileInput.files));

    function addFiles(fileList) {
      const arr = Array.from(fileList).filter(f => f.type.startsWith('image/'));
      // 파일명 자연정렬 → 스크린샷 촬영 순서 유지
      arr.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
      for (const file of arr) {
        const li = document.createElement('li');
        const thumb = document.createElement('img');
        thumb.className = 'thumb'; thumb.src = URL.createObjectURL(file);
        thumb.onload = () => URL.revokeObjectURL(thumb.src);
        const name = document.createElement('span');
        name.className = 'fname'; name.textContent = file.name + ' · ' + fmt(file.size);
        const st = document.createElement('span');
        st.className = 'st wait'; st.textContent = '대기';
        li.append(thumb, name, st);
        $('files').appendChild(li);
        selected.push({ file, li, statusEl: st });
      }
      $('listCard').classList.remove('hidden');
      $('doneCard').classList.add('hidden');
      updateCounts();
    }

    function updateCounts() {
      $('counts').textContent = '선택됨 ' + selected.length + '장';
      $('start').disabled = running || selected.length === 0;
    }

    // ── 이미지 최적화 (긴 변 1080px + WebP/JPEG 압축) ───────────
    const MAX_EDGE = 1080, QUALITY = 0.82;
    function toBlob(canvas, type, q) { return new Promise(res => canvas.toBlob(res, type, q)); }

    async function optimize(file) {
      let bitmap;
      try { bitmap = await createImageBitmap(file); }
      catch (e) { throw new Error('이미지 디코드 실패(HEIC 등 미지원 형식일 수 있음)'); }
      const scale = Math.min(1, MAX_EDGE / Math.max(bitmap.width, bitmap.height));
      const w = Math.round(bitmap.width * scale), h = Math.round(bitmap.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      if (bitmap.close) bitmap.close();

      // WebP 우선 — 미지원 브라우저는 png로 폴백되므로 blob.type로 실제 확인
      let blob = await toBlob(canvas, 'image/webp', QUALITY);
      let type = 'image/webp', ext = 'webp';
      if (!blob || blob.type !== 'image/webp') {
        blob = await toBlob(canvas, 'image/jpeg', QUALITY);
        type = 'image/jpeg'; ext = 'jpg';
      }
      // 압축본이 원본보다 크면(이미 작은 파일) 원본 그대로 올림
      if (!blob || blob.size >= file.size) {
        const oext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
        return { blob: file, type: file.type || 'image/jpeg', ext: oext, before: file.size, after: file.size, optimized: false };
      }
      return { blob, type, ext, before: file.size, after: blob.size, optimized: true };
    }

    // ── 업로드 루프 ─────────────────────────────────────────────
    $('start').addEventListener('click', runUpload);
    $('again').addEventListener('click', () => {
      selected = []; $('files').innerHTML = '';
      $('listCard').classList.add('hidden'); $('doneCard').classList.add('hidden');
      fileInput.value = ''; updateCounts();
    });

    async function runUpload() {
      if (running) return;
      running = true; updateCounts();
      $('start').textContent = '업로드 중…';

      const base = parseInt($('startOrder').value || '0', 10) || 0;
      let ok = 0, fail = 0, totalBefore = 0, totalAfter = 0;
      const fails = [];

      for (let i = 0; i < selected.length; i++) {
        const item = selected[i];
        const set = (cls, txt) => { item.statusEl.className = 'st ' + cls; item.statusEl.textContent = txt; };
        try {
          set('work', '압축 중…');
          const opt = await optimize(item.file);

          set('work', '업로드 중…');
          const path = crypto.randomUUID() + '.' + opt.ext;
          const up = await MONC.sb.storage.from('reviews')
            .upload(path, opt.blob, { upsert: false, contentType: opt.type });
          if (up.error) throw up.error;

          const ins = await MONC.sb.from('reviews')
            .insert({ image_path: path, caption: null, sort_order: base + i, visible: true });
          if (ins.error) {
            // insert 실패 시 고아 파일 정리
            await MONC.sb.storage.from('reviews').remove([path]);
            throw ins.error;
          }

          ok++; totalBefore += opt.before; totalAfter += opt.after;
          set('done', opt.optimized ? (fmt(opt.before) + ' → ' + fmt(opt.after)) : (fmt(opt.before) + ' (원본)'));
        } catch (e) {
          fail++; fails.push(item.file.name + ': ' + (e.message || e));
          set('fail', '실패');
        }
        const pct = Math.round(((i + 1) / selected.length) * 100);
        $('progress').style.width = pct + '%';
        $('progressText').textContent = (i + 1) + ' / ' + selected.length + ' 처리됨';
      }

      running = false;
      $('start').textContent = '업로드 시작';
      updateCounts();

      const saved = totalBefore > 0 ? Math.round((1 - totalAfter / totalBefore) * 100) : 0;
      $('doneSummary').innerHTML =
        '<span class="ok">완료 ' + ok + '장</span>' +
        (fail ? ' · <span class="err">실패 ' + fail + '장</span>' : '') +
        (totalBefore ? ' · 용량 ' + fmt(totalBefore) + ' → ' + fmt(totalAfter) + ' (' + saved + '% 절감)' : '');
      if (fails.length) {
        $('doneSummary').innerHTML += '<div class="muted" style="margin-top:8px;font-weight:400;">' +
          fails.map(f => '· ' + f).join('<br>') + '</div>';
      }
      $('doneCard').classList.remove('hidden');
    }

    initAuth();
  </script>
</body>
</html>
